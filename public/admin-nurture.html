<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/js/icons.js?v=20260712-esign"></script>
  <script src="/js/lib-kst.js?v=2-kst-pin"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>후원자 너처링 — 싸이렌 어드민</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Noto Sans KR", sans-serif; background: #f6f7f9; color: #1f2430; font-size: 14px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #6b7280; font-size: 12.5px; margin-bottom: 16px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab { padding: 9px 18px; border: 1px solid #e3e6eb; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .tab.active { background: #7a1f2b; color: #fff; border-color: #7a1f2b; }
  .jcard { background: #fff; border: 1px solid #e8eaee; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .jhead { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .jname { font-size: 16px; font-weight: 700; }
  .kpi { color: #6b7280; font-size: 12px; }
  .kpi b { color: #1f2430; }
  .toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12.5px; }
  .switch { width: 40px; height: 22px; border-radius: 22px; background: #cbd2da; position: relative; transition: .15s; }
  .switch.on { background: #1a8b46; }
  .switch i { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: .15s; }
  .switch.on i { left: 20px; }
  input, select { padding: 6px 8px; border: 1px solid #d8dce2; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
  .btn { padding: 7px 13px; border: 1px solid #d1d5db; background: #fff; border-radius: 7px; cursor: pointer; font-size: 12.5px; }
  .btn:hover { background: #f6f7f9; }
  .btn-p { background: #7a1f2b; color: #fff; border-color: #7a1f2b; }
  .btn-p:hover { background: #8c2533; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-del { color: #c5293a; border-color: #f2c4ca; }
  .sec-title { font-size: 13px; font-weight: 700; color: #374151; margin: 18px 0 8px; }
  .foot { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }

  /* 카드형 단계 편집 */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
  .step-card { border: 1px solid #e8eaee; border-radius: 10px; padding: 13px; background: #fcfcfd; }
  .step-card.new { border-style: dashed; border-color: #c8b3b7; background: #fdfafa; }
  .sc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .sc-day { display: inline-flex; align-items: center; gap: 3px; font-weight: 700; color: #7a1f2b; font-size: 13px; white-space: nowrap; }
  .sc-day input { width: 56px; }
  .sc-day select { padding: 5px 6px; }
  .sc-label { flex: 1; min-width: 0; }
  .sc-active { font-size: 12px; color: #6b7280; white-space: nowrap; display: inline-flex; align-items: center; gap: 3px; }
  .sc-grid { display: flex; gap: 8px; margin-bottom: 8px; }
  .sc-f { display: flex; flex-direction: column; gap: 3px; }
  .sc-f.sc-grow { flex: 1; min-width: 0; }
  .sc-f label { font-size: 11px; color: #8a8f99; font-weight: 600; }
  .sc-f select { width: 100%; }
  .sc-preview { background: #fff; border: 1px solid #eef0f3; border-left: 3px solid #7a1f2b; border-radius: 6px; padding: 9px 11px; font-size: 12.5px; line-height: 1.65; color: #3a3f4a; margin-bottom: 9px; white-space: pre-wrap; word-break: break-word; }
  .sc-preview .pv-empty { color: #b4b9c1; font-style: italic; }
  .sc-preview .pv-sub { font-size: 11.5px; color: #7a1f2b; font-weight: 600; margin-bottom: 4px; }
  .sc-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .add-step, .add-ev { margin-top: 10px; border-style: dashed; color: #7a1f2b; }
  .sc-flabel { display: block; font-size: 11.5px; color: #6b7280; font-weight: 600; margin: 4px 0 4px; }
  textarea.f-body { width: 100%; border: 1px solid #d8dce2; border-radius: 7px; padding: 9px 11px; font-size: 13px; font-family: inherit; line-height: 1.6; resize: vertical; }
  textarea.f-body:focus { outline: none; border-color: #7a1f2b; }
  .sc-img { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
  .sc-thumb img { width: 46px; height: 46px; object-fit: cover; border-radius: 6px; border: 1px solid #e3e6eb; vertical-align: middle; }
  .img-status { font-size: 11px; }
  .f-subject { width: 100%; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2430; color: #fff; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: .2s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
  .hint { font-size: 11.5px; color: #9aa0a8; }
  .off-note { font-size: 11.5px; color: #c47a00; }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="siren-icon-wrap" data-icon="sprout"></span> 후원자 너처링</h1>
  <div class="sub">후원자 단계(정기·예비·잠재)별로 D0~D365 자동 메시지를 설계합니다. 여정을 켜면 매일 자동 발송됩니다. (수신 동의·하루 1통·주 3통 자동 적용)</div>

  <div class="tabs">
    <div class="tab active" data-tab="regular">정기 후원자</div>
    <div class="tab" data-tab="prospect">예비 후원자</div>
    <div class="tab" data-tab="potential">잠재 후원자</div>
    <div class="tab" data-tab="analytics"><span class="siren-icon-wrap" data-icon="bar-chart-3"></span> 성과</div>
  </div>

  <div id="content"><div class="hint">불러오는 중…</div></div>
</div>
<div class="toast" id="toast"></div>

<script src="/js/admin-nurture.js?v=20260627e-edit-img"></script>
</body>
</html>
