<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>활동 보고서 | 교사유가족협의회</title>
<meta name="description" content="투명한 집행, 공개된 신뢰 — 교사유가족협의회의 활동 보고서를 확인하세요.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
    <link rel="stylesheet" href="/css/print.css">
</head>
<body data-page="support">

  <div id="header-slot"></div>

  <main>

    <section class="page-hero">
      <div class="container">
        <h1>활동 보고서</h1>
        <p>투명한 집행, 공개된 신뢰</p>
      </div>
    </section>

    <div class="container breadcrumb">
      <a href="/index.html">홈</a> &nbsp;›&nbsp; 주요 활동 &nbsp;›&nbsp; 활동 보고서
    </div>

    <section class="block">
      <div class="container">

        <!-- 연도 필터 + 안내 -->
        <div class="report-toolbar" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px">
          <div style="font-size:13px;color:var(--text-2)">
            발행된 활동보고서를 확인하고 <strong>인쇄 / PDF로 저장</strong>하실 수 있습니다.
          </div>
          <div>
            <label for="reportYearFilter" style="font-size:13px;color:var(--text-2);margin-right:8px">연도</label>
            <select id="reportYearFilter" style="padding:6px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff">
              <option value="">전체</option>
            </select>
          </div>
        </div>

        <!-- 보고서 목록 -->
        <div id="reportList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3);font-size:14px">
            불러오는 중...
          </div>
        </div>

      </div>
    </section>

    <!-- 상세 모달 -->
    <div id="reportDetailModal" class="report-detail-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);padding:30px 20px;align-items:center;justify-content:center">
      <div class="report-detail-box" style="background:#fff;border-radius:8px;max-width:900px;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;margin:0 auto">
        <div class="report-detail-head no-print" style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px">
          <h3 id="reportDetailTitle" style="margin:0;font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">보고서 제목</h3>
          <button type="button" data-close-report-detail
                  style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-3);padding:0 6px;line-height:1">&times;</button>
        </div>
        <div class="report-detail-body activity-report-body" id="reportDetailBody" style="padding:24px 28px;overflow-y:auto;flex:1;font-family:'Noto Serif KR',serif"></div>
        <div class="report-detail-foot no-print" style="padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:#fafafa">
          <button type="button" data-print-report
                  style="background:var(--brand,#8b2942);color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">
            🖨 인쇄 / PDF 저장
          </button>
          <button type="button" data-close-report-detail
                  style="background:#fff;color:var(--text-2);border:1px solid var(--line);padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer">
            닫기
          </button>
        </div>
      </div>
    </div>

  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=3"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/support.js?v=3"></script>
  <script src="/js/donate.js?v=5"></script>

  <!-- 활동보고서 페이지 전용 스크립트 -->
  <script>
  (function() {
    const listEl = document.getElementById('reportList');
    const yearFilter = document.getElementById('reportYearFilter');
    const modal = document.getElementById('reportDetailModal');
    const modalTitle = document.getElementById('reportDetailTitle');
    const modalBody = document.getElementById('reportDetailBody');

    let _reports = [];
    let _allYears = [];  // ★ 연도 필터: 전체 연도 고정 보관 (필터링과 무관)

    /* ===== API 호출 ===== */
    async function loadReports(year) {
      try {
        const url = year
          ? `/api/public/activity-reports?year=${encodeURIComponent(year)}`
          : '/api/public/activity-reports';
        const res = await fetch(url, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'load failed');

        // ★ API 응답 형식: { ok, message, data: { list: [...] } }
        const list = (data && data.data && data.data.list) || data.list || [];
        _reports = list;
        // ★ 최초 로드 시에만 전체 연도 목록 확정 (이후 필터링 시 변경 없음)
        if (_allYears.length === 0) {
          _allYears = [...new Set(list.map((p) => p.year).filter(Boolean))].sort((a, b) => b - a);
        }
        renderList();
        renderYearOptions();
      } catch (e) {
        console.error('[report] load error', e);
        listEl.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--danger,#c03);font-size:14px">
            보고서를 불러오지 못했습니다.<br/>
            <span style="font-size:12px;color:var(--text-3)">${escapeHtml(e.message || '')}</span>
          </div>`;
      }
    }

    async function loadDetail(id) {
      try {
        const res = await fetch(`/api/public/activity-reports?id=${id}`, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'detail failed');

        // ★ 단건 API 응답 형식: { ok, data: { post: {...}, pdf: null } }
        const r = (data && data.data && data.data.post) || (data && data.post) || {};
        modalTitle.textContent = r.title || '보고서';
        modalBody.innerHTML = r.contentHtml || '<p style="color:var(--text-3)">본문이 비어있습니다.</p>';
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      } catch (e) {
        alert('상세 내용을 불러오지 못했습니다: ' + (e.message || e));
      }
    }

    /* ===== 렌더 ===== */
    function renderList() {
      if (!_reports.length) {
        listEl.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3);font-size:14px">
            📋 아직 발행된 활동보고서가 없습니다.<br/>
            <span style="font-size:12px">정식 분기 보고서 발행 시 이곳에 표시됩니다.</span>
          </div>`;
        return;
      }

      listEl.innerHTML = _reports.map((p) => {
        const period = fmtPeriod(p.year, p.month);
        const date = fmtDate(p.publishedAt || p.createdAt);
        const pin = p.isPinned ? '<span style="color:#c03;font-size:11px;margin-right:6px">📌 고정</span>' : '';
        return `
          <div class="report-card" style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s">
            <div style="font-size:12px;color:var(--brand,#8b2942);font-weight:600">${pin}${escapeHtml(period)}</div>
            <div style="font-size:15px;font-weight:700;color:var(--text-1);line-height:1.4;min-height:42px;font-family:'Noto Serif KR',serif">
              ${escapeHtml(p.title || '제목 없음')}
            </div>
            <div style="font-size:11.5px;color:var(--text-3);display:flex;gap:10px;flex-wrap:wrap">
              <span>📢 발행됨</span>
              <span>👁 조회 ${p.views || 0}</span>
              <span>${escapeHtml(date)}</span>
            </div>
            <div style="margin-top:4px">
              <button type="button" data-report-id="${p.id}"
                      style="width:100%;padding:8px 14px;background:var(--brand,#8b2942);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">
                📖 보기
              </button>
            </div>
          </div>`;
      }).join('');
    }

    function renderYearOptions() {
      // ★ 필터링된 결과가 아닌 _allYears (전체) 사용 — 필터 선택해도 옵션 유지
      const current = yearFilter.value;
      yearFilter.innerHTML = '<option value="">전체</option>' +
        _allYears.map((y) => `<option value="${y}"${String(y) === current ? ' selected' : ''}>${y}년</option>`).join('');
    }

    /* ===== 이벤트 ===== */
    document.addEventListener('click', (e) => {
      // 보고서 보기 버튼
      const btn = e.target.closest('[data-report-id]');
      if (btn) {
        loadDetail(btn.dataset.reportId);
        return;
      }

      // 모달 닫기
      if (e.target.matches('[data-close-report-detail]') || e.target.closest('[data-close-report-detail]')) {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        return;
      }
      if (e.target.id === 'reportDetailModal') {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        return;
      }

      // 인쇄
      if (e.target.matches('[data-print-report]') || e.target.closest('[data-print-report]')) {
        e.preventDefault();
        try { window.print(); } catch (err) { console.error('[report] print failed', err); }
        return;
      }
    });

    // ESC 키
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display !== 'none') {
        modal.style.display = 'none';
        document.body.style.overflow = '';
      }
    });

    // 연도 필터
    yearFilter.addEventListener('change', () => {
      loadReports(yearFilter.value || null);
    });

    /* ===== 유틸 ===== */
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtPeriod(y, m) {
      if (!y) return '';
      if (!m) return `${y}년 연간`;
      if (m >= 1 && m <= 3) return `${y}년 1분기`;
      if (m >= 4 && m <= 6) return `${y}년 2분기`;
      if (m >= 7 && m <= 9) return `${y}년 3분기`;
      if (m >= 10 && m <= 12) return `${y}년 4분기`;
      return `${y}년 ${m}월`;
    }
    function fmtDate(s) {
      if (!s) return '';
      try {
        const d = new Date(s);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
      } catch { return s; }
    }

    /* ===== 진입점 ===== */
    loadReports();
  })();
  </script>

</body>
</html>
