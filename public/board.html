<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자유게시판 | 교사유가족협의회</title>
<meta name="description" content="교사들이 자유롭게 소통하는 공간입니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<link rel="stylesheet" href="/css/board.css?v=m8">
</head>
<body data-page="board-list">

  <div id="header-slot"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>💬 자유게시판</h1>
        <p>교사들이 자유롭게 소통하는 공간입니다</p>
      </div>
    </section>

    <div class="container breadcrumb">
      <a href="/index.html">홈</a> &nbsp;›&nbsp; <span>자유게시판</span>
    </div>

    <section class="block">
      <div class="container">
        <div class="board-wrap">

          <div class="board-toolbar">
            <div class="board-cat-tabs">
              <button class="board-cat-tab active" data-cat="">전체</button>
              <button class="board-cat-tab" data-cat="general">자유</button>
              <button class="board-cat-tab" data-cat="share">경험 공유</button>
              <button class="board-cat-tab" data-cat="question">질문</button>
              <button class="board-cat-tab" data-cat="info">정보</button>
              <button class="board-cat-tab" data-cat="etc">기타</button>
            </div>

            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <div class="board-search-box">
                <input type="search" id="boardSearch" placeholder="제목·내용 검색">
                <button type="button" id="btnBoardSearch">🔍 검색</button>
              </div>
              <a href="/board-write.html" class="board-write-btn">✏️ 글쓰기</a>
            </div>
          </div>

          <div id="boardListContainer">
            <div style="text-align:center;padding:60px;color:var(--text-3)">목록을 불러오는 중...</div>
          </div>

          <div class="board-pagination" id="boardPagination" style="display:none"></div>

        </div>
      </div>
    </section>
  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=4"></script>
  <script src="/js/auth.js?v=6"></script>
  <script src="/js/board.js?v=m8"></script>
</body>
</html>
