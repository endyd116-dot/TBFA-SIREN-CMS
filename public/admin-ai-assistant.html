<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🤖 SIREN AI 비서 | 관리자</title>
<meta name="robots" content="noindex,nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Noto Sans KR', sans-serif;
  background: #f1f5f9; color: #1e293b;
  height: 100vh; overflow: hidden;
}

.layout {
  display: grid; grid-template-columns: 280px 1fr;
  height: 100vh;
}

/* ── 좌측 사이드바 ── */
.sidebar {
  background: #1e293b; color: #e2e8f0;
  display: flex; flex-direction: column;
}
.sb-head {
  padding: 18px 20px; border-bottom: 1px solid #334155;
}
.sb-head .title { font-size: 15px; font-weight: 700; }
.sb-head .sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }

.sb-actions { padding: 12px 16px; border-bottom: 1px solid #334155; }
.sb-actions .btn-new {
  width: 100%; padding: 9px 14px; border: 1px solid #475569;
  background: #334155; color: #fff; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500;
}
.sb-actions .btn-new:hover { background: #475569; }

.sb-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.sb-conv {
  display: block; padding: 10px 18px; cursor: pointer; font-size: 12.5px;
  color: #cbd5e1; border-left: 3px solid transparent;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-conv:hover { background: #334155; }
.sb-conv.active { background: #1e40af; color: #fff; border-left-color: #fbbf24; }
.sb-conv-time { display: block; font-size: 10.5px; color: #94a3b8; margin-top: 2px; }

.sb-back {
  padding: 12px 16px; border-top: 1px solid #334155;
}
.sb-back a {
  color: #94a3b8; font-size: 12px; text-decoration: none;
}
.sb-back a:hover { color: #fff; }

/* ── 우측 메인 ── */
.main {
  display: flex; flex-direction: column; background: #f8fafc;
}
.main-head {
  background: #fff; padding: 16px 28px; border-bottom: 1px solid #e2e8f0;
  display: flex; justify-content: space-between; align-items: center;
}
.main-head h1 { margin: 0; font-size: 17px; font-weight: 600; }
.main-head .sub { font-size: 11.5px; color: #64748b; margin-left: 8px; }

.msgs {
  flex: 1; overflow-y: auto; padding: 28px 32px;
  display: flex; flex-direction: column; gap: 16px;
  max-width: 920px; width: 100%; margin: 0 auto;
}
.msg { display: flex; flex-direction: column; gap: 6px; }
.msg.user { align-items: flex-end; }
.msg.ai { align-items: flex-start; }
.bubble {
  max-width: 75%; padding: 12px 16px; border-radius: 14px;
  font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble { background: #1e40af; color: #fff; border-bottom-right-radius: 4px; }
.msg.ai   .bubble { background: #fff; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }

.tools-info {
  background: #fff8e1; border-left: 3px solid #ca8a04;
  padding: 10px 14px; border-radius: 6px; font-size: 12px; color: #713f12;
  max-width: 75%;
}
.tools-info b { font-family: monospace; }

.pending-card {
  background: #fef9c3; border: 2px solid #facc15; border-radius: 10px;
  padding: 14px 18px; max-width: 75%;
}
.pending-card h5 { margin: 0 0 8px; color: #713f12; font-size: 14px; }
.pending-card pre {
  background: #fff; padding: 10px 12px; border-radius: 6px;
  font-size: 12px; overflow-x: auto; margin: 8px 0;
  max-height: 280px; white-space: pre-wrap; word-break: break-all;
  font-family: 'Inter', monospace;
}
.pending-actions { display: flex; gap: 10px; margin-top: 10px; }
.pending-actions button {
  padding: 8px 18px; border: none; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-weight: 600;
}
.btn-approve { background: #16a34a; color: #fff; }
.btn-approve:hover { background: #15803d; }
.btn-reject  { background: #e2e8f0; color: #1e293b; }
.btn-reject:hover { background: #cbd5e1; }

.input-bar {
  padding: 18px 28px; border-top: 1px solid #e2e8f0; background: #fff;
  display: flex; gap: 10px; max-width: 920px; width: 100%; margin: 0 auto;
}
.input-bar textarea {
  flex: 1; min-height: 46px; max-height: 160px; resize: none;
  padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px;
  font-size: 14px; font-family: inherit; line-height: 1.5;
}
.input-bar textarea:focus {
  outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1);
}
.input-bar button.send {
  background: #1e40af; color: #fff; border: none; border-radius: 8px;
  padding: 0 24px; font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.input-bar button.send:disabled { background: #94a3b8; cursor: not-allowed; }

.empty {
  text-align: center; color: #94a3b8; padding: 48px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty h2 { margin: 0; font-size: 18px; color: #475569; font-weight: 500; }
.empty .grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  max-width: 600px; width: 100%; margin-top: 12px;
}
.empty .suggest {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 14px 16px; font-size: 13px; color: #475569; cursor: pointer;
  text-align: left; transition: all 0.15s;
}
.empty .suggest:hover { border-color: #1e40af; color: #1e40af; box-shadow: 0 4px 12px rgba(30,64,175,0.08); }
.empty .suggest .icon { font-size: 18px; margin-right: 6px; }
</style>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sb-head">
      <div class="title">🤖 SIREN AI 비서</div>
      <div class="sub">베타 — 콘텐츠·관리</div>
    </div>
    <div class="sb-actions">
      <button class="btn-new" id="btnNewConv">+ 새 대화</button>
    </div>
    <div class="sb-list" id="convList">
      <div style="padding:24px;color:#94a3b8;font-size:12px;text-align:center">대화 이력 로딩 중…</div>
    </div>
    <div class="sb-back">
      <a href="/cms-tbfa.html" onclick="location.href='/cms-tbfa.html';return false;">← CMS로 돌아가기</a>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <div>
        <h1 id="convTitle">새 대화</h1>
        <span class="sub">콘텐츠 페이지 수정·공지·캠페인·메뉴 관리</span>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty">
        <h2>무엇을 도와드릴까요?</h2>
        <p style="font-size:13px;color:#64748b">아래 예시를 클릭하거나 직접 명령을 입력하세요.</p>
        <div class="grid">
          <button class="suggest" data-prompt="현재 메인 페이지 콘텐츠 목록 모두 보여줘"><span class="icon">📄</span>메인 페이지 콘텐츠 조회</button>
          <button class="suggest" data-prompt="공지사항 새로 작성하고 싶어. 제목과 본문 추천해줘."><span class="icon">📢</span>공지사항 등록</button>
          <button class="suggest" data-prompt="새 캠페인 등록하고 싶어. 봄 모금 캠페인 1000만원 목표로."><span class="icon">🎯</span>캠페인 등록</button>
          <button class="suggest" data-prompt="헤더 메뉴 구조 보여줘"><span class="icon">📋</span>메뉴 구조 조회</button>
          <button class="suggest" data-prompt="about 페이지 인사말을 좀 더 따뜻한 톤으로 수정 제안해줘"><span class="icon">✏️</span>인사말 수정 제안</button>
          <button class="suggest" data-prompt="메인 hero 영역 문구를 추모 분위기로 바꿔줘"><span class="icon">🕯</span>메인 hero 수정</button>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="input" placeholder="명령을 입력하세요…  (Enter 전송, Shift+Enter 줄바꿈)" rows="1"></textarea>
      <button class="send" id="btnSend">보내기</button>
    </div>
  </main>

</div>

<script>
(function () {
  'use strict';
  var conversationId = null;

  function $(id) { return document.getElementById(id); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]);
    });
  }

  function appendMsg(role, text) {
    var msgs = $('msgs');
    var empty = msgs.querySelector('.empty');
    if (empty) empty.remove();
    var m = document.createElement('div');
    m.className = 'msg ' + role;
    m.innerHTML = '<div class="bubble"></div>';
    m.querySelector('.bubble').textContent = text;
    msgs.appendChild(m);
    msgs.scrollTop = msgs.scrollHeight;
    return m;
  }

  function appendToolsInfo(toolCalls) {
    if (!toolCalls || !toolCalls.length) return;
    var msgs = $('msgs');
    var box = document.createElement('div');
    box.className = 'tools-info';
    box.innerHTML = '🔧 사용한 도구: ' + toolCalls.map(function (t) {
      return '<b>' + escapeHtml(t.name) + '</b>(' + (t.result.ok ? '✓' : '✗') + ')';
    }).join(', ');
    msgs.appendChild(box);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendPendingApproval(p) {
    var msgs = $('msgs');
    var box = document.createElement('div');
    box.className = 'pending-card';
    box.innerHTML = '<h5>⚠️ 작업 승인이 필요합니다</h5>' +
      '<div>도구: <b>' + escapeHtml(p.toolName) + '</b></div>' +
      '<pre>' + escapeHtml(JSON.stringify(p.preview, null, 2)) + '</pre>' +
      '<div class="pending-actions">' +
      '  <button class="btn-approve">✅ 승인하고 실행</button>' +
      '  <button class="btn-reject">취소</button>' +
      '</div>';
    msgs.appendChild(box);
    msgs.scrollTop = msgs.scrollHeight;

    box.querySelector('.btn-approve').addEventListener('click', function () {
      box.remove();
      var argsApproved = Object.assign({}, p.args, { requireApproval: false });
      sendApprovedTool(p.toolName, argsApproved);
    });
    box.querySelector('.btn-reject').addEventListener('click', function () {
      box.remove();
      appendMsg('ai', '취소했습니다. 다른 작업을 도와드릴까요?');
    });
  }

  async function sendMsg() {
    var input = $('input');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    appendMsg('user', text);
    var btn = $('btnSend');
    btn.disabled = true;
    var thinking = appendMsg('ai', '🤔 생각 중…');
    try {
      var res = await fetch('/api/admin-ai-agent', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversationId: conversationId, userMessage: text }),
      });
      var j = await res.json().catch(function () { return {}; });
      thinking.remove();
      if (!res.ok) throw new Error((j.error || 'HTTP ' + res.status) + (j.detail ? ' — ' + j.detail : '') + (j.step ? ' [step:' + j.step + ']' : ''));
      conversationId = j.conversationId || conversationId;
      if (j.title || (j.conversationId && !$('convTitle').dataset.set)) {
        $('convTitle').textContent = text.slice(0, 60);
        $('convTitle').dataset.set = '1';
      }
      appendMsg('ai', j.reply || '(응답 없음)');
      if (j.toolCalls && j.toolCalls.length) appendToolsInfo(j.toolCalls);
      if (j.pendingApproval) appendPendingApproval(j.pendingApproval);
    } catch (err) {
      thinking.remove();
      appendMsg('ai', '❌ 오류: ' + (err.message || err));
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  async function sendApprovedTool(toolName, argsApproved) {
    var btn = $('btnSend');
    btn.disabled = true;
    var thinking = appendMsg('ai', '⚙️ 적용 중…');
    try {
      var res = await fetch('/api/admin-ai-agent', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          conversationId: conversationId,
          userMessage: '(시스템) 사용자 승인. ' + toolName + '을 다음 인자로 실제 적용해주세요: ' + JSON.stringify(argsApproved),
        }),
      });
      var j = await res.json().catch(function () { return {}; });
      thinking.remove();
      if (!res.ok) throw new Error((j.error || 'HTTP ' + res.status) + (j.detail ? ' — ' + j.detail : '') + (j.step ? ' [step:' + j.step + ']' : ''));
      appendMsg('ai', j.reply || '(응답 없음)');
      if (j.toolCalls && j.toolCalls.length) appendToolsInfo(j.toolCalls);
    } catch (err) {
      thinking.remove();
      appendMsg('ai', '❌ 오류: ' + (err.message || err));
    } finally {
      btn.disabled = false;
    }
  }

  /* ── 이벤트 ── */
  $('input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  $('input').addEventListener('input', function (e) {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
  });
  $('btnSend').addEventListener('click', sendMsg);
  $('btnNewConv').addEventListener('click', function () {
    conversationId = null;
    $('convTitle').textContent = '새 대화';
    $('convTitle').dataset.set = '';
    $('msgs').innerHTML = '';
    $('input').focus();
    /* 빈 화면 다시 표시 */
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = '<h2>새 대화 시작</h2><p style="font-size:13px;color:#64748b">명령을 입력하세요.</p>';
    $('msgs').appendChild(empty);
  });

  document.querySelectorAll('.suggest').forEach(function (b) {
    b.addEventListener('click', function () { $('input').value = b.dataset.prompt; $('input').focus(); });
  });

  /* ── 대화 이력 로드 (간이) ── */
  /* 추후 별도 API로 분리 — 현재는 placeholder */
  $('convList').innerHTML = '<div style="padding:24px;color:#94a3b8;font-size:12px;text-align:center">대화 이력은 곧 표시됩니다</div>';

  $('input').focus();
})();
</script>
</body>
</html>
