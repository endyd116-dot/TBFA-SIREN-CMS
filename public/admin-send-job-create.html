<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새 발송 만들기 | SIREN 어드민</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Noto Sans KR', sans-serif;
  background: #f1f5f9; color: #1e293b;
}

.page-wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }
.page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.page-desc  { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
.back-link  { display: inline-block; color: #1e40af; font-size: 0.85rem; margin-bottom: 12px; text-decoration: none; }
.back-link:hover { text-decoration: underline; }

.card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  padding: 22px 24px; margin-bottom: 16px;
}
.card-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #1e293b; }

.form-row { margin-bottom: 18px; }
.form-row:last-child { margin-bottom: 0; }
.form-label {
  display: block; font-size: 0.85rem; font-weight: 500; color: #334155;
  margin-bottom: 6px;
}
.form-label .req { color: #b91c1c; margin-left: 4px; }
.form-hint { font-size: 0.78rem; color: #94a3b8; margin-top: 4px; }

.form-input,
.form-select {
  width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 0.9rem; font-family: inherit; background: #fff; color: #1e293b;
}
.form-input:focus,
.form-select:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }

.radio-group { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
.radio-group label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.9rem; cursor: pointer;
}
.radio-group input[type="radio"] { accent-color: #1e40af; }

.btn {
  padding: 8px 16px; border: 1px solid #cbd5e1; background: #fff;
  border-radius: 6px; font-size: 0.9rem; cursor: pointer;
  font-family: inherit; color: #1e293b;
}
.btn:hover { background: #f8fafc; }
.btn-primary { background: #1e40af; color: #fff; border-color: #1e40af; }
.btn-primary:hover { background: #1d3fa8; }
.btn-primary:disabled { background: #94a3b8; border-color: #94a3b8; cursor: not-allowed; }

.btn-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }

/* 미리보기 */
.preview-box {
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px;
  background: #f8fafc;
}
.preview-empty { color: #94a3b8; font-size: 0.875rem; padding: 24px 0; text-align: center; }
.preview-meta {
  display: flex; flex-wrap: wrap; gap: 18px;
  font-size: 0.875rem; color: #475569;
  padding-bottom: 12px; border-bottom: 1px solid #e2e8f0; margin-bottom: 12px;
}
.preview-meta .label { color: #94a3b8; margin-right: 4px; }
.preview-sample-title {
  font-size: 0.82rem; color: #64748b; margin-bottom: 6px;
}
.preview-sample {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 12px 14px; font-size: 0.875rem;
}
.preview-sample .subject {
  font-weight: 600; color: #1e293b; margin-bottom: 8px;
  padding-bottom: 8px; border-bottom: 1px solid #f1f5f9;
}
.preview-sample .body {
  white-space: pre-wrap; color: #334155; line-height: 1.55;
  max-height: 240px; overflow-y: auto;
}
.preview-warnings {
  margin-top: 12px; padding: 10px 12px;
  background: #fef9c3; border-left: 3px solid #ca8a04;
  font-size: 0.825rem; color: #854d0e; border-radius: 4px;
}
.preview-warnings ul { margin: 4px 0 0 0; padding-left: 20px; }
.preview-warnings li { margin-bottom: 2px; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1e293b; color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 0.875rem;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s; z-index: 9999;
  max-width: 420px;
}
.toast.show  { opacity: 1; transform: translateY(0); }
.toast.error { background: #b91c1c; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #e2e8f0; border-top-color: #1e40af;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<main class="page-wrap"><div class="page-title">새 발송 만들기</div>
  <p class="page-desc">
    템플릿과 수신자 그룹을 골라 즉시 또는 예약 발송을 등록합니다.
    둘 다 선택하면 자동으로 미리보기가 표시됩니다.
  </p>

  <div class="card">
    <div class="card-title">발송 정보</div>

    <div class="form-row">
      <label class="form-label" for="fName">발송 이름<span class="req">*</span></label>
      <input class="form-input" type="text" id="fName" maxlength="200" placeholder="예) 월간 뉴스레터 5월호" />
      <div class="form-hint">관리자 식별용 — 수신자에게 노출되지 않습니다.</div>
    </div>

    <div class="form-row">
      <label class="form-label" for="fTemplate">템플릿<span class="req">*</span></label>
      <select class="form-select" id="fTemplate">
        <option value="">불러오는 중…</option>
      </select>
      <div class="form-hint">활성 상태인 템플릿만 표시됩니다. 채널은 템플릿이 결정합니다.</div>
    </div>

    <div class="form-row">
      <label class="form-label" for="fGroup">수신자 그룹<span class="req">*</span></label>
      <select class="form-select" id="fGroup">
        <option value="">불러오는 중…</option>
      </select>
      <div class="form-hint">활성 상태인 그룹만 표시됩니다. 발송 시작 시점의 회원이 스냅샷됩니다.</div>
    </div>

    <div class="form-row">
      <label class="form-label">발송 시간<span class="req">*</span></label>
      <div class="radio-group">
        <label>
          <input type="radio" name="scheduleType" value="now" checked />
          즉시 발송
        </label>
        <label>
          <input type="radio" name="scheduleType" value="scheduled" />
          예약
        </label>
      </div>
      <div id="scheduledRow" style="display:none; margin-top:10px;">
        <input class="form-input" type="datetime-local" id="fScheduledAt" style="max-width:280px;" />
        <div class="form-hint">현재 시각으로부터 1분 이상 미래여야 합니다.</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">미리보기</div>
    <div id="previewBox" class="preview-box">
      <div class="preview-empty">템플릿과 그룹을 모두 선택하면 자동으로 미리보기가 표시됩니다.</div>
    </div>
  </div>

  <div class="btn-bar">
    <button class="btn" id="btnCancel">취소</button>
    <button class="btn btn-primary" id="btnSubmit">등록</button>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="/js/admin-send-job-create.js?v=1"></script>
</body>
</html>
