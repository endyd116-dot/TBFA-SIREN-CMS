<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>글쓰기 | 자유게시판</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">
<link rel="stylesheet" href="/css/board.css?v=m8">
<link rel="stylesheet" href="/css/attachment.css?v=m2">
</head>
<body data-page="board-write">

  <div id="header-slot"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>✏️ <span id="boardWriteTitle">글쓰기</span></h1>
        <p>자유게시판에 게시글을 작성합니다</p>
      </div>
    </section>

    <div class="container breadcrumb">
      <a href="/index.html">홈</a> &nbsp;›&nbsp; <a href="/board.html">자유게시판</a> &nbsp;›&nbsp; <span id="boardWriteCrumb">글쓰기</span>
    </div>

    <section class="block">
      <div class="container">
        <div class="board-wrap">
          <form id="boardWriteForm" class="board-write-form">
            <input type="hidden" name="id" id="boardEditId" value="">

            <div class="fg">
              <label>카테고리 <span class="req">*</span></label>
              <select name="category" id="boardCategory" required>
                <option value="general">자유</option>
                <option value="share">경험 공유</option>
                <option value="question">질문/도움요청</option>
                <option value="info">정보 공유</option>
                <option value="etc">기타</option>
              </select>
            </div>

            <div class="fg">
              <label>제목 <span class="req">*</span></label>
              <input type="text" name="title" id="boardTitle" required maxlength="200" placeholder="제목을 입력하세요">
            </div>

            <div class="fg">
              <label>내용 <span class="req">*</span> <span class="hint">(이미지·서식·표 가능)</span></label>
              <div id="boardEditor"></div>
            </div>

            <div class="fg">
              <label>첨부 파일 <span class="hint">(선택)</span></label>
              <div id="boardAttachments"></div>
            </div>

            <label class="checkbox-line">
              <input type="checkbox" name="isAnonymous" id="boardAnonymous">
              <span>익명으로 작성합니다 <span style="color:var(--text-3);font-size:12px">(닉네임이 "익명"으로 표시됩니다)</span></span>
            </label>

            <div class="board-write-actions">
              <a href="/board.html" class="btn-cancel" style="text-decoration:none;display:inline-flex;align-items:center;text-align:center">취소</a>
              <button type="submit" class="btn-submit" id="boardSubmitBtn">등록</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=4"></script>
  <script src="/js/auth.js?v=6"></script>
  <script src="/js/editor.js?v=m2-5"></script>
  <script src="/js/attachment.js?v=m2-5"></script>
  <script src="/js/board.js?v=m8"></script>
</body>
</html>
