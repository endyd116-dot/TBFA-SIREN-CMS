<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>발송 작업 | SIREN 어드민</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Noto Sans KR', sans-serif;
  background: #f1f5f9; color: #1e293b;
}

.page-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 80px; }
.page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.page-desc  { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
.back-link  { display: inline-block; color: #1e40af; font-size: 0.85rem; margin-bottom: 12px; text-decoration: none; }
.back-link:hover { text-decoration: underline; }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  padding: 14px 16px; margin-bottom: 16px;
}
.filter-bar label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.825rem; color: #475569;
}
.filter-bar input[type="text"],
.filter-bar input[type="date"],
.filter-bar select {
  padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 0.85rem; font-family: inherit; background: #fff;
}
.filter-bar input[type="text"] { width: 220px; }

.btn {
  padding: 7px 14px; border: 1px solid #cbd5e1; background: #fff;
  border-radius: 6px; font-size: 0.85rem; cursor: pointer;
  font-family: inherit; color: #1e293b;
}
.btn:hover { background: #f8fafc; }
.btn-primary { background: #1e40af; color: #fff; border-color: #1e40af; }
.btn-primary:hover { background: #1d3fa8; }
.btn-sm { padding: 4px 10px; font-size: 0.78rem; }

.table-wrap {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  overflow: hidden;
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  background: #f8fafc; padding: 11px 12px; font-size: 0.78rem;
  font-weight: 600; color: #64748b; text-align: left;
  border-bottom: 1px solid #e2e8f0;
}
.tbl tbody tr { border-bottom: 1px solid #f1f5f9; cursor: pointer; }
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody tr:hover { background: #f8fafc; }
.tbl td { padding: 12px; font-size: 0.875rem; vertical-align: middle; }
.tbl .col-id      { width: 60px;  color: #94a3b8; font-family: 'Inter', monospace; }
.tbl .col-name    { font-weight: 500; }
.tbl .col-tpl     { color: #475569; font-size: 0.825rem; }
.tbl .col-grp     { color: #475569; font-size: 0.825rem; }
.tbl .col-time    { width: 150px; color: #475569; font-size: 0.825rem; white-space: nowrap; }
.tbl .col-status  { width: 110px; }
.tbl .col-progress{ width: 160px; }

.badge {
  display: inline-block; padding: 2px 10px; border-radius: 4px;
  font-size: 0.74rem; font-weight: 500;
}
.badge-pending    { background: #f1f5f9; color: #64748b; }
.badge-processing { background: #dbeafe; color: #1e40af; }
.badge-completed  { background: #dcfce7; color: #166534; }
.badge-failed     { background: #fee2e2; color: #b91c1c; }
.badge-cancelled  { background: #fef9c3; color: #854d0e; }

.progress-num { font-variant-numeric: tabular-nums; font-size: 0.82rem; color: #475569; margin-bottom: 4px; }
.progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%; background: #1e40af; transition: width 0.3s;
}
.progress-fill.completed  { background: #16a34a; }
.progress-fill.failed     { background: #b91c1c; }
.progress-fill.cancelled  { background: #ca8a04; }

.empty-state { padding: 48px 20px; text-align: center; color: #94a3b8; font-size: 0.9rem; }

.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-top: 16px; font-size: 0.85rem; color: #475569;
}
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1e293b; color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 0.875rem;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s; z-index: 9999;
  max-width: 420px;
}
.toast.show  { opacity: 1; transform: translateY(0); }
.toast.error { background: #b91c1c; }

.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  border-radius: 6px; height: 44px; margin-bottom: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<main class="page-wrap"><div class="page-title">발송 작업</div>
  <p class="page-desc">
    템플릿과 수신자 그룹을 결합해서 즉시 또는 예약 발송합니다.
    상태가 <b>대기/진행 중</b>이면 작업을 클릭해서 실시간 진행률을 확인할 수 있습니다.
  </p>

  <div class="filter-bar">
    <label>상태
      <select id="fStatus">
        <option value="">전체</option>
        <option value="pending">대기</option>
        <option value="processing">진행 중</option>
        <option value="completed">완료</option>
        <option value="failed">실패</option>
        <option value="cancelled">취소됨</option>
      </select>
    </label>
    <label>기간
      <input type="date" id="fFrom" />
      <span style="color:#94a3b8;">~</span>
      <input type="date" id="fTo" />
    </label>
    <label>검색
      <input type="text" id="fSearch" placeholder="작업 이름 부분 일치" />
    </label>
    <button class="btn" id="btnReload">조회</button>
    <span style="flex:1;"></span>
    <button class="btn btn-primary" id="btnNew">+ 새 발송</button>
  </div>

  <div id="loadingArea">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div id="tableArea" style="display:none;">
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th>이름</th>
            <th>템플릿</th>
            <th>그룹</th>
            <th class="col-time">시간</th>
            <th class="col-status">진행 상태</th>
            <th class="col-progress">진행률</th>
            <th style="width:140px">동작</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <button class="btn btn-sm" id="btnPrev">‹ 이전</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn btn-sm" id="btnNext">다음 ›</button>
      <span style="margin-left:12px;color:#94a3b8;">총 <span id="totalCount">0</span>건</span>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="/js/admin-send-jobs.js?v=20260516fail-label"></script>
</body>
</html>
