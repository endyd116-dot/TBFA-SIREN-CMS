<script>
(function(){
  const TYPE_LABEL = { fundraising: '모금', memorial: '추모', awareness: '인식 개선' };

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* Q4-019: 어드민 작성 리치 HTML을 innerHTML로 넣기 전 최소 살균(방어적).
     <script>·이벤트 핸들러(on*=)·javascript:/data: URL을 제거해 계정탈취·DB변조 시 XSS 차단.
     서식 태그(p/b/img/a 등)는 유지. 완전한 살균이 필요하면 서버 화이트리스트/ DOMPurify 도입 권장. */
  function sanitizeHtml(html) {
    var s = String(html == null ? '' : html);
    /* US-049: 위험 태그에 svg/math/form 추가, on* 핸들러 구분자에 '/'도 포함(<svg/onload=> 우회 차단),
       javascript/data/vbscript 스킴은 xlink:href 까지 무력화. 정규식 살균은 한계가 있어
       근본 대책(서버 화이트리스트/DOMPurify)은 Swain 라이브러리 결정 후 도입 권장. */
    s = s.replace(/<\s*(script|iframe|object|embed|svg|math|form)\b[\s\S]*?<\s*\/\s*\1\s*>/gi, '');
    s = s.replace(/<\s*(script|iframe|object|embed|svg|math|form)\b[^>]*>/gi, '');
    s = s.replace(/[\s/]on\w+\s*=\s*"[^"]*"/gi, ' ');
    s = s.replace(/[\s/]on\w+\s*=\s*'[^']*'/gi, ' ');
    s = s.replace(/[\s/]on\w+\s*=\s*[^\s>]+/gi, ' ');
    s = s.replace(/(href|src|xlink:href)\s*=\s*("|')\s*(javascript|data|vbscript)\s*:[^"']*\2/gi, '$1="#"');
    return s;
  }

  async function load() {
    const root = document.getElementById('cmpRoot');
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    const id = params.get('id');
    if (!slug && !id) {
      root.innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--danger)">잘못된 URL입니다.</div>';
      return;
    }

    try {
      const res = await fetch('/api/campaigns?' + (slug ? 'slug=' + encodeURIComponent(slug) : 'id=' + id));
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error('실패');
      const c = data.data?.campaign || data.campaign;

      const thumb = c.thumbnailBlobId
        ? `background-image:url('/api/blob-image?id=${c.thumbnailBlobId}')`
        : 'background:linear-gradient(135deg,#7a1f2b,#a64252)';
      const goal = c.goalAmount || 0;
      const raised = c.raisedAmount || 0;
      const pct = c.progressPercent;

      const progressHtml = goal > 0
        ? `<div class="cmp-progress-large"><div class="cmp-progress-large-fill" style="width:${pct}%"></div></div>
           <div style="font-size:14px;color:var(--text-2);text-align:right;margin-bottom:14px">${pct}% 달성</div>
           <div class="cmp-stats-row">
             <div class="cmp-stats-item"><div class="cmp-stats-label">현재 모금액</div><div class="cmp-stats-value brand">₩${raised.toLocaleString()}</div></div>
             <div class="cmp-stats-item"><div class="cmp-stats-label">목표 금액</div><div class="cmp-stats-value">₩${goal.toLocaleString()}</div></div>
             <div class="cmp-stats-item"><div class="cmp-stats-label">후원자</div><div class="cmp-stats-value">${(c.donorCount || 0).toLocaleString()}명</div></div>
             ${c.remainingDays !== null ? `<div class="cmp-stats-item"><div class="cmp-stats-label">남은 기간</div><div class="cmp-stats-value">D-${c.remainingDays}</div></div>` : ''}
           </div>`
        : `<div class="cmp-stats-row">
             <div class="cmp-stats-item"><div class="cmp-stats-label">참여 후원자</div><div class="cmp-stats-value brand">${(c.donorCount || 0).toLocaleString()}명</div></div>
             ${c.remainingDays !== null ? `<div class="cmp-stats-item"><div class="cmp-stats-label">남은 기간</div><div class="cmp-stats-value">D-${c.remainingDays}</div></div>` : ''}
           </div>`;

      const isClosed = c.status === 'closed';

      root.innerHTML = `
        <div class="cmp-detail-hero" style="${thumb}">
          <span class="cmp-detail-type-badge">${TYPE_LABEL[c.type] || c.type}</span>
        </div>

        <h1 class="cmp-detail-title">${escapeHtml(c.title)}</h1>

        ${c.summary ? `<div class="cmp-detail-summary">${escapeHtml(c.summary)}</div>` : ''}

        <div class="cmp-stats-card">
          ${progressHtml}
        </div>

        <div class="cmp-detail-content">${sanitizeHtml(c.contentHtml || '')}</div>

        ${isClosed
          ? '<div style="text-align:center;padding:30px;background:#f5f4f2;border-radius:8px;color:var(--text-3)">이 캠페인은 종료되었습니다. 함께해주신 모든 분들께 감사드립니다. </div>'
          : `<button class="cmp-cta" data-cmp-donate="${c.id}" data-cmp-slug="${escapeHtml(c.slug)}" data-cmp-title="${escapeHtml(c.title)}">
              이 캠페인에 후원하기
            </button>`
        }
      `;
    } catch (e) {
      root.innerHTML = '<div style="text-align:center;padding:80px 20px;color:var(--danger)">캠페인을 찾을 수 없습니다.</div>';
    }
  }

  /* v11 묶음 C-7: 후원하기 버튼 → 같은 페이지에서 모달 오픈 (이동 X)
     - sessionStorage에 캠페인 정보 저장 (donate.js가 자동 prefill)
     - 표준 [data-action="open-modal"] 가짜 트리거로 common.js의 모달 오픈 메커니즘 활용
     - donateModal이 partials 로드 후에 DOM에 들어오므로, 최대 6초 대기 후 폴백 */
  function openDonateModalForCampaign(campaignInfo) {
    sessionStorage.setItem('siren_preselect_campaign', JSON.stringify(campaignInfo));

    const tryOpen = () => {
      const modal = document.getElementById('donateModal');
      if (!modal) return false;
      /* common.js가 [data-action="open-modal"] 클릭을 감지하므로 가짜 트리거 dispatch */
      const trigger = document.createElement('a');
      trigger.setAttribute('href', 'javascript:void(0)');
      trigger.setAttribute('data-action', 'open-modal');
      trigger.setAttribute('data-target', 'donateModal');
      trigger.style.display = 'none';
      document.body.appendChild(trigger);
      trigger.click();
      setTimeout(() => trigger.remove(), 100);
      return true;
    };

    /* 즉시 시도 */
    if (tryOpen()) return;

    /* partials 아직 로드 안 됨 → 200ms 간격 / 최대 30회 (6초) 대기 */
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      if (tryOpen()) {
        clearInterval(interval);
      } else if (attempts > 30) {
        clearInterval(interval);
        /* 폴백 — 6초 대기해도 모달이 안 뜨면 메인으로 이동 (기존 동작) */
        location.href = '/index.html#donate';
      }
    }, 200);
  }

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-cmp-donate]');
    if (!btn) return;
    e.preventDefault();

    /* 시각적 피드백 — 버튼이 "준비 중..." 으로 잠시 변경 */
    const orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = '후원 모달 준비 중...';
    setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 1500);

    const id = Number(btn.dataset.cmpDonate);
    const slug = btn.dataset.cmpSlug;
    const title = btn.dataset.cmpTitle;
    openDonateModalForCampaign({ id, slug, title });
  });

  load();
})();
</script>
