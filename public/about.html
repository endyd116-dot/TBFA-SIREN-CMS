<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>협의회 소개 | 교사유가족협의회</title>
<meta name="description" content="교사유가족협의회 — 인사말, 비전, 설립 취지 및 연혁을 소개합니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css?v=3">
<link rel="stylesheet" href="/css/layout.css?v=3">
<link rel="stylesheet" href="/css/components.css?v=3">
<link rel="stylesheet" href="/css/pages.css?v=3">

<style>
  /* ★ M-11: 동적 콘텐츠 영역 — 로딩 중 placeholder */
  .about-cp[data-cp-loading] {
    min-height: 60px;
    background: linear-gradient(90deg, #f5f4f2 0%, #fafaf8 50%, #f5f4f2 100%);
    background-size: 200% 100%;
    animation: cp-shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  @keyframes cp-shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  .about-cp h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .about-cp p { line-height: 1.85; color: var(--text-2); margin-bottom: 12px; }
  .about-cp ul, .about-cp ol { margin: 12px 0 12px 20px; line-height: 2; color: var(--text-2); }
  .about-cp blockquote {
    border-left: 4px solid var(--brand);
    background: var(--bg-soft);
    padding: 10px 16px;
    margin: 14px 0;
  }
  .about-cp img { max-width: 100%; height: auto; border-radius: 6px; margin: 8px 0; }
  .about-cp table { width: 100%; }
  .about-cp .history-item strong {
    color: var(--brand);
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    display: block;
  }
  .about-cp .history-item p { margin-top: 8px; }
  .about-cp .history-item { margin-bottom: 28px; }
</style>
</head>
<body data-page="about">

  <div id="header-slot"></div>

  <main>

    <section class="page-hero">
      <div class="container">
        <h1>협의회 소개</h1>
        <p>존엄한 기억, 투명한 동행 — 교사유가족협의회가 함께합니다</p>
      </div>
    </section>

    <div class="container breadcrumb">
      <a href="/index.html">홈</a> &nbsp;›&nbsp; 협의회 소개 &nbsp;›&nbsp; 인사말
    </div>

    <!-- GREETING (★ M-11 동적) -->
    <section class="block" id="greeting">
      <div class="container">
        <div class="about-wrap">
          <div class="sec-eyebrow" style="text-align:center">GREETING</div>
          <h2 class="sec-title" style="text-align:center;margin-bottom:36px">인사말</h2>

          <div class="about-cp greeting-text" data-cp-key="about_greeting_text" data-cp-loading></div>

          <div class="about-cp greeting-sign" data-cp-key="about_greeting_sign" data-cp-loading></div>
        </div>
      </div>
    </section>

    <!-- VISION (★ M-11 동적 — 카드 3개) -->
    <section class="block" style="padding-top:0;background:var(--bg-soft)">
      <div class="container">
        <div class="about-wrap" style="padding:60px 0">
          <div class="sec-eyebrow" style="text-align:center">VISION & MISSION</div>
          <h2 class="sec-title" style="text-align:center;margin-bottom:36px">우리의 약속</h2>

          <div class="support-grid">
            <div class="sup-card">
              <div class="sup-icon">🕯️</div>
              <div class="about-cp" data-cp-key="about_vision_card_1" data-cp-loading></div>
            </div>
            <div class="sup-card">
              <div class="sup-icon">📊</div>
              <div class="about-cp" data-cp-key="about_vision_card_2" data-cp-loading></div>
            </div>
            <div class="sup-card">
              <div class="sup-icon">🤝</div>
              <div class="about-cp" data-cp-key="about_vision_card_3" data-cp-loading></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- HISTORY (★ M-11 동적) -->
    <section class="block" id="history">
      <div class="container">
        <div class="about-wrap">
          <div class="sec-eyebrow" style="text-align:center">HISTORY</div>
          <h2 class="sec-title" style="text-align:center;margin-bottom:48px">주요 연혁</h2>

          <div class="history-line">
            <div class="about-cp" data-cp-key="about_history" data-cp-loading></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ORGANIZATION & LOCATION (★ M-11 동적) -->
    <section class="block" id="org" style="padding-top:0;background:var(--bg-soft)">
      <div class="container">
        <div style="padding:60px 0">
          <div class="sec-eyebrow" style="text-align:center">ORGANIZATION</div>
          <h2 class="sec-title" style="text-align:center;margin-bottom:36px">조직도 / 오시는 길</h2>

          <div class="row-1-1">
            <div class="panel">
              <div class="p-head"><div class="p-title">조직 구성</div></div>
              <div class="about-cp" data-cp-key="about_org" data-cp-loading></div>
            </div>

            <div class="panel">
              <div class="p-head"><div class="p-title">오시는 길</div></div>
              <div style="background:var(--bg-mute);border-radius:8px;height:200px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:13px;margin-bottom:16px">
                🗺️ 지도 영역 (Kakao/Google Map API 연동 위치)
              </div>
              <div class="about-cp" data-cp-key="about_location" data-cp-loading></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=4"></script>
  <script src="/js/auth.js?v=6"></script>
  <script src="/js/support.js?v=4"></script>
  <script src="/js/donate.js?v=4"></script>
  <script src="/js/about.js?v=m11"></script>
</body>
</html>
