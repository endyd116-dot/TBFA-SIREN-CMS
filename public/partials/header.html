<!-- ============================================================
     SIREN HEADER — 자체 완결형 스타일 (외부 CSS 의존 없음)
     ============================================================ -->
<style>
  /* ===== 헤더 자체 완결형 스타일 ===== */
  header.site-header .header-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:78px;
    gap:24px;
    flex-wrap:nowrap;
  }
  header.site-header .brand{
    display:flex;align-items:center;gap:12px;
    flex-shrink:0;text-decoration:none;color:inherit;
  }
  header.site-header .brand-mark{
    width:42px;height:42px;border-radius:8px;background:#0f0f0f;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  header.site-header .brand-mark svg{width:24px;height:24px}
  header.site-header .brand-text{
    font-family:'Noto Serif KR',serif;font-weight:700;font-size:18px;
    line-height:1.1;white-space:nowrap;
  }
  header.site-header .brand-text small{
    display:block;font-family:'Inter';font-size:9.5px;color:#8a8a8a;
    letter-spacing:.22em;font-weight:500;margin-top:3px;white-space:nowrap;
  }

  /* GNB 한 줄 강제 */
  header.site-header nav.gnb{
    display:flex;flex-wrap:nowrap;gap:32px;
    flex:1 1 auto;justify-content:center;align-items:center;
    list-style:none;margin:0;padding:0;min-width:0;
  }
  header.site-header nav.gnb > li{
    position:relative;list-style:none;margin:0;padding:0;flex-shrink:0;
  }
  header.site-header nav.gnb > li > a{
    display:block;padding:28px 4px;font-weight:500;font-size:15px;
    color:#1a1a1a;text-decoration:none;white-space:nowrap;
    position:relative;transition:color .25s;
  }
  header.site-header nav.gnb > li > a:hover,
  header.site-header nav.gnb > li.active > a{color:#7a1f2b}
  header.site-header nav.gnb > li > a::after{
    content:"";position:absolute;left:4px;right:4px;bottom:22px;
    height:2px;background:#7a1f2b;
    transform:scaleX(0);transform-origin:left;transition:transform .25s;
  }
  header.site-header nav.gnb > li:hover > a::after,
  header.site-header nav.gnb > li.active > a::after{transform:scaleX(1)}

  /* DROPDOWN — 기본 숨김 (외부 inline 충돌 없음) */
  header.site-header nav.gnb .dropdown{
    position:absolute;top:calc(100% - 6px);left:-16px;
    background:#fff;border:1px solid #e8e6e3;
    min-width:200px;padding:8px 0;margin:0;border-radius:10px;
    box-shadow:0 20px 50px rgba(15,15,15,.12);
    list-style:none;
    opacity:0;visibility:hidden;pointer-events:none;
    transform:translateY(6px);
    transition:opacity .25s, visibility .25s, transform .25s;
    z-index:50;
  }
  header.site-header nav.gnb > li:hover > .dropdown,
  header.site-header nav.gnb > li:focus-within > .dropdown{
    opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);
  }
  header.site-header nav.gnb .dropdown li{
    list-style:none;margin:0;padding:0;
  }
  header.site-header nav.gnb .dropdown a{
    display:block;padding:11px 22px;font-size:13.5px;
    color:#525252;text-decoration:none;transition:.25s;white-space:nowrap;
  }
  header.site-header nav.gnb .dropdown a:hover{
    background:#fafaf9;color:#7a1f2b;padding-left:26px;
  }

  /* CTA 버튼 */
  header.site-header .cta{
    flex-shrink:0;padding:11px 22px;background:#0f0f0f;color:#fff;
    border-radius:30px;font-weight:600;font-size:13.5px;
    display:inline-flex;align-items:center;gap:8px;
    border:none;cursor:pointer;white-space:nowrap;
    transition:all .25s;text-decoration:none;
  }
  header.site-header .cta:hover{
    background:#7a1f2b;transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(122,31,43,.25);
  }
  header.site-header .cta-ribbon{width:14px;height:14px;flex-shrink:0}

  /* 모바일 햄버거 토글 */
  header.site-header .mobile-toggle{
    display:none;
    width:40px;height:40px;border:1px solid #e8e6e3;border-radius:8px;
    align-items:center;justify-content:center;cursor:pointer;
    background:#fff;flex-shrink:0;position:relative;
  }
  header.site-header .mobile-toggle span,
  header.site-header .mobile-toggle::before,
  header.site-header .mobile-toggle::after{
    content:"";position:absolute;left:50%;width:18px;height:2px;
    background:#0f0f0f;transform:translateX(-50%);transition:.3s;
  }
  header.site-header .mobile-toggle::before{top:13px}
  header.site-header .mobile-toggle span{top:50%;margin-top:-1px}
  header.site-header .mobile-toggle::after{bottom:13px}

  /* ===== 반응형 ===== */
  @media (max-width:1200px){
    header.site-header nav.gnb{gap:24px !important}
    header.site-header nav.gnb > li > a{font-size:14px !important}
    header.site-header .header-row{gap:16px !important}
    header.site-header .brand-text{font-size:16px !important}
  }
  @media (max-width:1080px){
    header.site-header nav.gnb{gap:18px !important}
    header.site-header nav.gnb > li > a{font-size:13px !important;padding:28px 2px !important}
    header.site-header .brand-text small{display:none !important}
  }
  @media (max-width:920px){
    header.site-header .header-row{height:64px !important}
    header.site-header nav.gnb{display:none !important}
    header.site-header .mobile-toggle{display:flex !important}
    header.site-header .brand-text{font-size:15px !important}

    /* 모바일 메뉴 펼침 */
    header.site-header nav.gnb.mobile-open{
      display:flex !important;
      flex-direction:column !important;
      position:absolute !important;
      top:100% !important;
      left:0 !important;
      right:0 !important;
      background:#fff !important;
      border-top:1px solid #e8e6e3 !important;
      border-bottom:1px solid #e8e6e3 !important;
      padding:10px 24px !important;
      gap:0 !important;
      z-index:99 !important;
      box-shadow:0 8px 20px rgba(0,0,0,.08) !important;
      align-items:stretch !important;
      justify-content:flex-start !important;
    }
    header.site-header nav.gnb.mobile-open > li{
      border-bottom:1px solid #f0eeeb !important;
      width:100% !important;
    }
    header.site-header nav.gnb.mobile-open > li:last-child{border-bottom:none !important}
    header.site-header nav.gnb.mobile-open > li > a{
      padding:14px 4px !important;
      font-size:14px !important;
    }
    header.site-header nav.gnb.mobile-open .dropdown{
      position:static !important;
      opacity:1 !important;
      visibility:visible !important;
      pointer-events:auto !important;
      box-shadow:none !important;
      border:none !important;
      background:#fafaf9 !important;
      border-radius:6px !important;
      margin:0 0 8px 0 !important;
      transform:none !important;
      padding:4px 0 !important;
      min-width:auto !important;
    }
  }
  @media (max-width:560px){
    header.site-header .cta{padding:9px 14px !important;font-size:12px !important}
    header.site-header .brand-text{font-size:14px !important}
  }
</style>
