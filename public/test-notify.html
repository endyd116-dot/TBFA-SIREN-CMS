<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SIREN 알림 시스템 테스트 (M-3)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/notification.css?v=m3">
  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f9fafb; }
    h1 { color: #2563eb; }
    .panel { margin: 20px 0; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; }
    button.act { padding: 8px 16px; margin-right: 8px; cursor: pointer; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; }
    .header-mock { display:flex; justify-content:flex-end; padding: 12px 20px; background:#fff; border-bottom:1px solid #e5e7eb; align-items:center; gap:12px; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; }
    .info { background: #eff6ff; color: #1e40af; line-height: 1.7; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>

  <!-- 헤더 모킹 -->
  <div class="header-mock">
    <span style="font-size:13px;color:#6b7280;">테스트 사용자</span>
    <div id="siren-notification-bell"></div>
  </div>

  <h1>🔔 SIREN 알림 시스템 (M-3)</h1>

  <div class="panel info">
    <strong>🔍 검증 항목:</strong>
    <ul>
      <li>벨 아이콘 표시 (우상단)</li>
      <li>아래 버튼으로 알림 생성 → 30초 내 자동 갱신 OR "지금 새로고침" 버튼</li>
      <li>크리티컬 생성 시 화면 우상단에 토스트 팝업</li>
      <li>벨 클릭 → 드롭다운 → 항목 클릭 → 읽음 처리 + 링크 이동</li>
      <li>"모두 읽음" 클릭 → 뱃지 사라짐</li>
    </ul>
    <strong>⚠️ 주의:</strong> 로그인 상태에서만 벨이 보입니다. 비로그인이면 벨이 자동 숨겨집니다.
  </div>

  <div class="panel">
    <h3>테스트 알림 생성 (직접 API 호출)</h3>
    <button class="act" id="btnInfo">📩 일반 알림 생성</button>
    <button class="act" id="btnWarning">⚠️ 경고 알림 생성</button>
    <button class="act" id="btnCritical">🚨 크리티컬 알림 생성</button>
    <button class="act" id="btnRefresh">🔄 지금 새로고침</button>
    <pre id="output">버튼을 클릭하면 알림이 생성됩니다.</pre>
  </div>

  <script src="/js/notification-bell.js?v=m3"></script>
  <script>
    /* 테스트용: 본인에게 알림 생성하는 임시 API 직접 호출 */
    /* 운영 시에는 createNotification()이 서버 측에서 호출됨 */
    async function makeViaSeed(severity, title, message) {
      const res = await fetch('/api/notify-test-seed', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ severity, title, message }),
      });
      const json = await res.json();
      document.getElementById('output').textContent = JSON.stringify(json, null, 2);
    }

    document.getElementById('btnInfo').onclick = () =>
      makeViaSeed('info', '📋 새 지원 신청이 접수되었습니다', '심리상담 신청 1건이 새로 들어왔습니다.');
    document.getElementById('btnWarning').onclick = () =>
      makeViaSeed('warning', '⚠️ 정기 결제 실패', '카드 결제 실패 (1회). 다음 재시도까지 3일 소요');
    document.getElementById('btnCritical').onclick = () =>
      makeViaSeed('critical', '🚨 비정상 로그인 시도 감지', '관리자 계정에 5회 이상 비밀번호 실패가 발생했습니다.');
    document.getElementById('btnRefresh').onclick = () => {
      window.location.reload();
    };
  </script>

</body>
</html>
