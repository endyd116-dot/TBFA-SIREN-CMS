<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCI 자동 재부팅 설정 (1회용·슈퍼어드민)</title>
  <style>
    body { font-family:'Pretendard','Noto Sans KR',sans-serif; background:#f4f6fa; color:#1a2035; padding:24px; max-width:760px; margin:0 auto; }
    h2 { font-size:18px; margin-bottom:4px; }
    p.desc { font-size:13px; color:#6b7280; margin-bottom:20px; line-height:1.6; }
    .card { background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.08); padding:20px 22px; margin-bottom:16px; }
    label { display:block; font-size:12.5px; font-weight:600; color:#374151; margin:12px 0 4px; }
    input, textarea { width:100%; padding:8px 10px; font-size:13px; border:1px solid #d1d5db; border-radius:6px; font-family:inherit; }
    textarea { height:160px; font-family:'D2Coding','Consolas',monospace; font-size:12px; }
    input:focus, textarea:focus { outline:none; border-color:#6366f1; }
    .hint { font-size:11px; color:#9ca3af; margin-top:3px; }
    .btn { padding:9px 18px; font-size:13px; font-weight:600; border:none; border-radius:6px; cursor:pointer; margin-right:8px; margin-top:16px; }
    .btn-primary { background:#6366f1; color:#fff; }
    .btn-light { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    #result { margin-top:16px; padding:12px 14px; border-radius:8px; font-size:13px; white-space:pre-wrap; display:none; }
    #result.ok { background:#dcfce7; color:#166534; display:block; }
    #result.err { background:#fee2e2; color:#991b1b; display:block; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  </style>
</head>
<body>
  <h2>⚙ OCI 자동 재부팅 설정</h2>
  <p class="desc">
    SMS 프록시(aligo-proxy) VM이 죽으면 자동 재부팅하기 위한 OCI 인증 설정을 저장합니다.<br>
    AWS Lambda 환경변수 4KB 한도를 피해 <strong>Netlify Blobs</strong>에 저장됩니다. <strong>슈퍼어드민 로그인 상태</strong>에서만 동작하며, 등록·검증 후 이 페이지는 삭제됩니다.
  </p>

  <div class="card">
    <div class="row2">
      <div><label>OCI_TENANCY_OCID</label><input id="tenancy" placeholder="ocid1.tenancy.oc1..aaaa..."></div>
      <div><label>OCI_USER_OCID</label><input id="user" placeholder="ocid1.user.oc1..aaaa..."></div>
    </div>
    <div class="row2">
      <div><label>OCI_FINGERPRINT</label><input id="fingerprint" placeholder="d6:dc:88:..."></div>
      <div><label>OCI_REGION</label><input id="region" placeholder="ap-chuncheon-1"></div>
    </div>
    <label>OCI_INSTANCE_OCID (aligo-proxy)</label>
    <input id="instanceId" placeholder="ocid1.instance.oc1.ap-chuncheon-1...">
    <label>OCI_PRIVATE_KEY (.pem 전체)</label>
    <textarea id="privateKey" placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"></textarea>
    <div class="hint">.pem 파일을 메모장/VS Code로 열어 BEGIN~END 줄까지 전체 붙여넣기</div>
    <label>OCI_PASSPHRASE (선택 — 키에 암호 없으면 비움)</label>
    <input id="passphrase" placeholder="(보통 비움)">

    <button class="btn btn-primary" id="btnSave">저장 + 검증</button>
    <button class="btn btn-light" id="btnVerify">검증만 (읽기 전용)</button>
    <button class="btn btn-light" id="btnStatus">현재 상태</button>
  </div>

  <div id="result"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    function show(ok, msg) {
      const el = $('result');
      el.className = ok ? 'ok' : 'err';
      el.textContent = msg;
    }
    async function api(method, qs) {
      const opts = { method, credentials:'include', headers:{'Content-Type':'application/json'} };
      if (method === 'POST') {
        opts.body = JSON.stringify({
          tenancy: $('tenancy').value.trim(),
          user: $('user').value.trim(),
          fingerprint: $('fingerprint').value.trim(),
          region: $('region').value.trim(),
          instanceId: $('instanceId').value.trim(),
          privateKey: $('privateKey').value,
          passphrase: $('passphrase').value.trim() || undefined,
        });
      }
      const r = await fetch('/api/admin-oci-config-set' + (qs||''), opts);
      let d; try { d = await r.json(); } catch(_) { d = {}; }
      return { status:r.status, d };
    }
    $('btnSave').addEventListener('click', async () => {
      $('btnSave').disabled = true;
      try {
        const { status, d } = await api('POST');
        if (d.ok) {
          const v = d.verify || {};
          show(v.ok, '저장 완료.\n인증 검증: ' + (v.ok ? '✅ ' : '❌ ') + (v.detail || JSON.stringify(v)));
        } else {
          show(false, '저장 실패 (HTTP ' + status + ')\n' + (d.error || '') + (d.detail ? '\n' + d.detail : ''));
        }
      } catch(e) { show(false, '오류: ' + e.message); }
      finally { $('btnSave').disabled = false; }
    });
    $('btnVerify').addEventListener('click', async () => {
      const { d } = await api('GET', '?verify=1');
      const v = d.verify || {};
      show(!!v.ok, '설정 소스: ' + (d.source||'?') + '\n인증 검증: ' + (v.ok ? '✅ ' : '❌ ') + (v.detail || JSON.stringify(v)));
    });
    $('btnStatus').addEventListener('click', async () => {
      const { d } = await api('GET');
      show(!!d.ok, '현재 설정 소스: ' + (d.source || '?') + ' (env=환경변수 / blobs=Blobs저장 / none=없음)');
    });
  </script>
</body>
</html>
