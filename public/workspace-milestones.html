  <div class="ws-sidebar-inner">

      <span class="ws-logo-icon">🏠</span>
      <span class="ws-logo-text">허브</span>

    <nav class="ws-sidebar-nav">
      <ul>
        <li class="ws-nav-group">
          <a href="#" data-sidebar-group="workspace" aria-expanded="true">
            <span class="ws-nav-icon">🛠</span>
            <span class="ws-nav-text">워크스페이스</span>
            <span class="sidebar-group-chevron">▾</span>
          </a>
          <ul data-sidebar-submenu="workspace" aria-hidden="false">
            <li><a href="/workspace.html" title="워크툴"><span class="ws-nav-icon">📊</span><span class="ws-nav-text">워크툴</span></a></li>

          </ul>

<main class="ws-main" id="wsMain">
  <div style="padding:24px 28px; max-width:960px; margin:0 auto;">

    <!-- 헤더 -->
    <div class="ms-header">
      <div>
        <h2>🏆 성과 관리</h2>
        <div style="font-size:13px; color:#6b7280; margin-top:2px" id="msSubtitle">로딩 중...</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <select id="msQuarterSelect" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px"></select>
        <span id="msQuarterBadge" class="ms-quarter-badge">-</span>
      </div>
    </div>

    <!-- 예상 인센티브 KPI -->
    <div class="ms-kpi-row" id="msKpiRow" style="display:none">
      <div class="ms-kpi">
        <div class="ms-kpi-label">매출연동 인센티브</div>
        <div class="ms-kpi-val blue" id="kpiRevenue">-</div>
      </div>
      <div class="ms-kpi">
        <div class="ms-kpi-label">비매출 보너스 (선택 2개)</div>
        <div class="ms-kpi-val green" id="kpiNonRevenue">-</div>
      </div>
      <div class="ms-kpi">
        <div class="ms-kpi-label">예상 합계</div>
        <div class="ms-kpi-val" id="kpiTotal" style="color:#111">-</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="ms-tabs" id="msTabs">
      <button class="ms-tab active" data-tab="overview">📊 내 현황</button>
      <button class="ms-tab" data-tab="revenue-input">📥 매출 입력</button>
      <button class="ms-tab admin-only" data-tab="revenue-verify" style="display:none">✅ 매출 검증</button>
      <button class="ms-tab admin-only" data-tab="nonrevenue" style="display:none">🎯 비매출 성과</button>
      <button class="ms-tab admin-only" data-tab="settlement" style="display:none">📋 분기 결산</button>
    </div>

    <!-- 탭 패널들 -->
    <div id="tabOverview" class="ms-tab-panel">
      <div class="ms-loading" id="overviewLoading">불러오는 중...</div>
      <div id="overviewContent" style="display:none"></div>
    </div>

    <div id="tabRevenueInput" class="ms-tab-panel" style="display:none">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">📥 매출 실적 입력</h3>
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px">
        <div class="ms-form-grid">
          <div class="ms-form-group">
            <label>마일스톤</label>
            <select id="riMilestoneId"></select>
          </div>
          <div class="ms-form-group">
            <label>날짜</label>
            <input type="date" id="riDate" value="">
          </div>
          <div class="ms-form-group">
            <label>금액 / 수량</label>
            <input type="number" id="riAmount" placeholder="숫자만 입력" step="any" min="0">
          </div>
          <div class="ms-form-group">
            <label>단위</label>
            <select id="riUnit">
              <option value="원">원</option>
              <option value="명">명</option>
              <option value="팀">팀</option>
              <option value="건">건</option>
            </select>
          </div>
          <div class="ms-form-group" id="riCampaignWrap" style="display:none">
            <label>후원자 유형</label>
            <select id="riCampaignRouted">
              <option value="false">직접 모집 (캠페인 외)</option>
              <option value="true">캠페인 경유 (장기후원 전환)</option>
            </select>
          </div>
          <!-- ★ R29-MS-GAP1-B: 사업체 명시 선택 -->
          <div class="ms-form-group">
            <label>사업체</label>
            <select id="riBusinessUnit">
              <option value="">-- 마일스톤 정의 기준 --</option>
              <option value="ASSOCIATION">협의회</option>
              <option value="WORKON">함께워크ON</option>
              <option value="PLEO">플레오</option>
            </select>
          </div>
          <!-- ★ R29-MS-GAP1-B: 매출 원천 명시 선택 (17종) -->
          <div class="ms-form-group">
            <label>매출 원천</label>
            <select id="riRevenueSource">
              <option value="">-- 마일스톤 정의 기준 --</option>
              <option value="ONLINE_REGULAR">온라인 정기후원</option>
              <option value="ONLINE_ONETIME">온라인 일시후원</option>
              <option value="OFFLINE_CASH">오프라인 현금</option>
              <option value="SMS_DONATION">문자후원</option>
              <option value="CORPORATE">기업후원</option>
              <option value="FOUNDATION">공익재단</option>
              <option value="GOVT_GRANT">정부보조금</option>
              <option value="LEGACY">유산기부</option>
              <option value="IN_KIND">물품기부환가</option>
              <option value="EVENT">행사수익</option>
              <option value="EDUCATION">교육수익</option>
              <option value="MEMBERSHIP_FEE">회비</option>
              <option value="AD_REVENUE">광고수익</option>
              <option value="INTEREST">이자수익</option>
              <option value="RENTAL">임대수익</option>
              <option value="INTL_COOP">국제협력</option>
              <option value="OTHER">기타</option>
            </select>
          </div>
          <div class="ms-form-group" style="grid-column:1/-1">
            <label>비고</label>
            <input type="text" id="riNote" placeholder="선택 사항" maxlength="200">
          </div>
          <!-- ★ R29-MS-GAP1-C: 증빙 파일 업로드 -->
          <div class="ms-form-group" style="grid-column:1/-1">
            <label>증빙 파일 (선택)</label>
            <input type="file" id="riEvidenceFile" accept="image/*,.pdf,.xlsx,.xls" multiple style="font-size:13px">
            <div id="riEvidenceList" style="margin-top:6px;font-size:12px;color:#6b7280"></div>
          </div>
        </div>
        <div style="margin-top:14px">
          <button class="ms-btn ms-btn-primary" id="riBtnSave">저장</button>
        </div>
      </div>
      <h3 style="font-size:15px;font-weight:700;margin-top:24px;margin-bottom:12px">내 입력 내역</h3>
      <div id="riList"></div>
    </div>

    <div id="tabRevenueVerify" class="ms-tab-panel" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:700;margin:0">✅ 매출 실적 검증</h3>
        <select id="rvStatusFilter" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px">
          <option value="PENDING">검증 대기</option>
          <option value="VERIFIED">검증 완료</option>
          <option value="ALL">전체</option>
        </select>
      </div>
      <div id="rvList"></div>
    </div>

    <div id="tabNonRevenue" class="ms-tab-panel" style="display:none">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:4px">🎯 비매출 성과</h3>
      <p style="font-size:13px;color:#6b7280;margin-bottom:16px">분기당 최대 <strong>2개</strong>를 선택해 인센티브를 받습니다. 먼저 슈퍼어드민 검증 후 선택 가능합니다.</p>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="ms-btn ms-btn-ghost ms-btn-sm" id="nrBtnSubmit">+ 성과 제출</button>
        <button class="ms-btn ms-btn-primary ms-btn-sm" id="nrBtnSaveSelect" style="display:none">선택 저장</button>
      </div>
      <div id="nrList"></div>
    </div>

    <div id="tabSettlement" class="ms-tab-panel" style="display:none">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">📋 분기 결산</h3>
      <div id="settlementPanel"></div>
    </div>

  </div>
</main>

<!-- 성과 제출 모달 -->
<div id="nrModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;overflow:auto">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:500px;margin:60px auto;position:relative">
    <h3 style="margin:0 0 16px;font-size:16px;font-weight:700">비매출 성과 제출</h3>
    <div class="ms-form-grid">
      <div class="ms-form-group" style="grid-column:1/-1">
        <label>마일스톤</label>
        <select id="nrMilestoneId"></select>
      </div>
      <div class="ms-form-group">
        <label>달성일</label>
        <input type="date" id="nrAchievedDate">
      </div>
      <div class="ms-form-group" style="grid-column:1/-1">
        <label>설명</label>
        <textarea id="nrDescription" rows="3" placeholder="달성 내용을 구체적으로 기술하세요" style="resize:vertical"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="ms-btn ms-btn-ghost" id="nrModalClose">취소</button>
      <button class="ms-btn ms-btn-primary" id="nrModalSave">제출</button>
    </div>
  </div>
</div>

<!-- 반려 사유 모달 -->
<div id="rejectModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:400px;margin:100px auto">
    <h3 style="margin:0 0 12px;font-size:16px;font-weight:700">반려 사유 입력</h3>
    <textarea id="rejectReason" rows="3" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13.5px;box-sizing:border-box" placeholder="반려 사유를 입력하세요"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button class="ms-btn ms-btn-ghost" id="rejectCancel">취소</button>
      <button class="ms-btn ms-btn-danger" id="rejectConfirm">반려</button>
    </div>
  </div>
</div>

<div id="wsToast" style="position:fixed;bottom:24px;right:24px;z-index:99999"></div>

<script src="/js/lib-kst.js?v=1"></script>
<script src="/js/auth.js?v=14" defer></script>
<script src="/js/workspace-sidebar.js?v=7" defer></script>
<script src="/js/lib-milestone-roles.js?v=1-r39" defer></script>
<script src="/js/workspace-milestones.js?v=14-r39" defer></script>
<script src="/js/ws-sidebar-role.js?v=1" defer></script>
</body>
