<style>
  .page-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    color: #fff;
    padding: 72px 0 56px;
    text-align: center;
  }
  .page-hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 700;
    margin: 0 0 14px;
    letter-spacing: -0.02em;
  }
  .page-hero p {
    font-size: 1rem;
    opacity: 0.75;
    margin: 0;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  .stories-section {
    padding: 56px 0 80px;
    min-height: 400px;
  }

  .stories-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
  }
  @media (min-width: 600px) {
    .stories-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 960px) {
    .stories-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .story-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .story-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.14);
  }

  .story-thumb {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #111;
    overflow: hidden;
  }
  .story-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .story-duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  .story-body {
    padding: 18px 20px 22px;
  }
  .story-cat {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }
  .story-cat.voice    { background: #e8f4fd; color: #1a6fa8; }
  .story-cat.intro    { background: #edf7ee; color: #2a7a3b; }
  .story-cat.tribute  { background: #fdf2e9; color: #a0522d; }
  .story-cat.interview{ background: #f3eefb; color: #6a3ba3; }
  .story-cat.default  { background: #f0f0f0; color: #555; }

  .story-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.55;
    margin: 0 0 8px;
    color: #1a1a2e;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .story-summary {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin: 0;
  }

  .stories-empty {
    text-align: center;
    padding: 80px 20px;
    color: #888;
  }
  .stories-empty p {
    font-size: 1.05rem;
    margin: 0;
  }

  .stories-loading {
    text-align: center;
    padding: 80px 20px;
    color: #aaa;
    font-size: 0.95rem;
  }
</style>
</head>
<body data-page="memorial">

  <div id="header-slot"></div>

  <main>

    <section class="page-hero">
      <div class="container">
        <h1>유가족 이야기</h1>
        <p>남겨진 이들의 목소리, 함께 기억하고 함께 걷습니다.</p>
      </div>
    </section>

    <section class="stories-section">
      <div class="container">
        <div id="storiesGrid" class="stories-grid" style="display:none"></div>
        <div id="storiesEmpty" class="stories-empty" style="display:none">
          <p>곧 이야기가 채워집니다.</p>
        </div>
        <div id="storiesLoading" class="stories-loading">불러오는 중…</div>
      </div>
    </section>

  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=20260603brand"></script>
  <script src="/js/family-stories.js?v=3"></script>
</body>
