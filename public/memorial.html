<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>온라인 추모관 | 교사유가족협의회</title>
<meta name="description" content="교사유가족협의회 온라인 추모관입니다. 먼저 떠난 선생님들을 함께 기억합니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css?v=3">
<link rel="stylesheet" href="/css/layout.css?v=3">
<link rel="stylesheet" href="/css/components.css?v=3">
<link rel="stylesheet" href="/css/pages.css?v=3">

<style>
  .memorial-hero {
    background: linear-gradient(160deg, #0d0d1a 0%, #1a1a2e 50%, #0f3460 100%);
    color: #fff;
    padding: 100px 0 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .memorial-hero::before {
    content: '🕯️';
    display: block;
    font-size: 3.5rem;
    margin-bottom: 24px;
    opacity: 0.85;
    animation: flicker 3s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    0%   { opacity: 0.75; transform: scale(1); }
    50%  { opacity: 0.95; transform: scale(1.04); }
    100% { opacity: 0.80; transform: scale(0.98); }
  }
  .memorial-hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    margin: 0 0 16px;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .memorial-hero .hero-tagline {
    font-size: 1rem;
    opacity: 0.65;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin: 0;
  }

  .memorial-coming-soon {
    padding: 80px 0 100px;
    text-align: center;
  }
  .coming-soon-box {
    max-width: 540px;
    margin: 0 auto;
    background: #f8f9ff;
    border: 1px solid #dde0f5;
    border-radius: 16px;
    padding: 52px 40px;
  }
  .coming-soon-box .cs-icon {
    font-size: 2.8rem;
    margin-bottom: 20px;
    display: block;
  }
  .coming-soon-box h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: #1a1a2e;
    margin: 0 0 14px;
  }
  .coming-soon-box p {
    font-size: 0.92rem;
    color: #666;
    line-height: 1.75;
    margin: 0 0 10px;
  }
  .coming-soon-box p:last-child { margin: 0; }
  .coming-soon-features {
    margin: 28px 0 0;
    padding: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .coming-soon-features li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
    color: #555;
    background: #fff;
    border: 1px solid #e8eaf8;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .coming-soon-features li .feat-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .memorial-link-cta {
    margin-top: 40px;
  }
  .memorial-link-cta a {
    display: inline-block;
    color: #0f3460;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    border-bottom: 1px solid #0f3460;
    padding-bottom: 1px;
    transition: opacity 0.15s;
  }
  .memorial-link-cta a:hover { opacity: 0.7; }
</style>
</head>
<body data-page="memorial">

  <div id="header-slot"></div>

  <main>

    <section class="memorial-hero">
      <div class="container">
        <h1>온라인 추모관</h1>
        <p class="hero-tagline">먼저 떠난 선생님들을 기억합니다</p>
      </div>
    </section>

    <section class="memorial-coming-soon">
      <div class="container">
        <div class="coming-soon-box">
          <span class="cs-icon">🕊️</span>
          <h2>곧 여러분과 만납니다</h2>
          <p>온라인 추모관을 준비하고 있습니다.<br>
             헌화·방명록 등 다양한 기능이 곧 공개됩니다.</p>

          <ul class="coming-soon-features">
            <li><span class="feat-icon">🕯️</span><span>촛불·국화 헌화 — 마음을 전해주세요</span></li>
            <li><span class="feat-icon">✉️</span><span>방명록 — 기억을 글로 남겨주세요</span></li>
            <li><span class="feat-icon">👨‍🏫</span><span>선생님 페이지 — 한 분 한 분의 이야기</span></li>
          </ul>

          <div class="memorial-link-cta">
            <a href="/family-stories.html" onclick="window.location.href='/family-stories.html';return false;">
              지금은 유가족 이야기 보러 가기 →
            </a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=4"></script>
</body>
</html>
