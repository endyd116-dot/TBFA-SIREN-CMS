<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팝업 관리 — SIREN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: #1a2035;
      background: #f4f6fa;
      padding: 24px;
      min-height: 100vh;
    }

    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .page-desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; }

    /* ─── 상단 액션 바 ─── */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    /* ─── 카드 ─── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* ─── 테이블 ─── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      text-align: left;
      padding: 10px 14px;
      background: #f9fafb;
      color: #6b7280;
      font-weight: 600;
      border-bottom: 1px solid #e5e7eb;
    }
    .data-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f2f5;
      color: #374151;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f9fafb; }

    /* ─── 상태 배지 ─── */
    .status-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-scheduled { background: #dbeafe; color: #1e40af; }

    /* ─── 버튼 ─── */
    .btn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-primary { background: #1e40af; color: #fff; }
    .btn-primary:hover { background: #1e3a8a; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-ghost { background: #f3f4f6; color: #374151; }
    .btn-ghost:hover { background: #e5e7eb; }

    /* ─── 모달 ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin: auto;
    }
    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-head h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #6b7280; }
    .modal-body { padding: 20px; }
    .modal-foot {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ─── 폼 ─── */
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .fg input, .fg textarea, .fg select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
    }
    .fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: #3b82f6; }
    .fg textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fg-hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }

    /* ─── 빈 상태 ─── */
    .empty-state { text-align: center; padding: 48px; color: #9ca3af; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 13px; }

    /* ─── 토스트 ─── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2035; color: #fff;
      padding: 10px 22px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: all 0.25s; pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<h2>📢 팝업 관리</h2>
<p class="page-desc">사이트에 노출되는 팝업을 등록하고 관리합니다.</p>

<div class="action-bar">
  <button class="btn btn-primary" id="btnAddPopup">+ 팝업 추가</button>
</div>

<div class="card">
  <div id="popupContent"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 팝업 추가/수정 모달 -->
<div class="modal-overlay" id="modalPopup">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalPopupTitle">팝업 추가</h3>
      <button class="modal-close" data-close="modalPopup">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="popupId">

      <div class="fg">
        <label>제목</label>
        <input type="text" id="popupTitle" placeholder="팝업 제목">
      </div>

      <div class="fg">
        <label>내용</label>
        <textarea id="popupContent2" rows="4" placeholder="팝업에 표시할 내용을 입력하세요."></textarea>
      </div>

      <div class="fg">
        <label>이미지 URL (선택)</label>
        <input type="url" id="popupImage" placeholder="https://...">
      </div>

      <div class="fg">
        <label>링크 URL (클릭 시 이동, 선택)</label>
        <input type="url" id="popupLink" placeholder="https://...">
      </div>

      <div class="fg">
        <label>표시 페이지</label>
        <input type="text" id="popupTargetPage" placeholder="예: /, /mypage.html, /donate.html (쉼표로 구분)">
        <div class="fg-hint">비워두면 모든 페이지에 표시됩니다.</div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>표시 빈도</label>
          <select id="popupFrequency">
            <option value="always">항상</option>
            <option value="session">세션당 1회</option>
            <option value="daily">하루 1회</option>
            <option value="weekly">주 1회</option>
          </select>
        </div>
        <div class="fg">
          <label>상태</label>
          <select id="popupStatus">
            <option value="active">활성</option>
            <option value="inactive">비활성</option>
          </select>
        </div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>시작일 (선택)</label>
          <input type="date" id="popupStartAt">
        </div>
        <div class="fg">
          <label>종료일 (선택)</label>
          <input type="date" id="popupEndAt">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-close="modalPopup">취소</button>
      <button class="btn btn-primary" id="btnSavePopup">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  'use strict';

  /* ── 유틸 ── */
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  async function api(path, opts = {}) {
    try {
      const r = await fetch(path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      const data = await r.json().catch(() => ({}));
      return { ok: r.ok, status: r.status, data };
    } catch (e) {
      return { ok: false, data: { error: e.message } };
    }
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return iso.slice(0, 10);
  }

  const FREQ_LABEL = { always: '항상', session: '세션 1회', daily: '하루 1회', weekly: '주 1회' };
  const STATUS_CLASS = { active: 'badge-active', inactive: 'badge-inactive', scheduled: 'badge-scheduled' };
  const STATUS_LABEL = { active: '활성', inactive: '비활성', scheduled: '예약' };

  /* ── 모달 ── */
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-close]');
    if (btn) document.getElementById(btn.dataset.close).classList.remove('show');
  });

  /* ── 목록 로드 ── */
  async function load() {
    const res = await api('/api/admin-popups');
    const d = res.data?.data || res.data || {};
    const popups = d.popups || [];
    const el = document.getElementById('popupContent');
    if (!popups.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📢</div><p>등록된 팝업이 없습니다.</p></div>';
      return;
    }
    el.innerHTML = `<table class="data-table">
      <thead><tr><th>제목</th><th>대상 페이지</th><th>빈도</th><th>기간</th><th>상태</th><th>관리</th></tr></thead>
      <tbody>${popups.map(p => {
        const status = !p.isActive ? 'inactive' : (p.startAt && new Date(p.startAt) > new Date() ? 'scheduled' : 'active');
        return `<tr>
          <td><strong>${p.title}</strong></td>
          <td style="font-size:11px;color:#6b7280">${p.targetPage || '전체'}</td>
          <td>${FREQ_LABEL[p.frequency] || p.frequency}</td>
          <td style="font-size:12px">${fmtDate(p.startAt)} ~ ${fmtDate(p.endAt)}</td>
          <td><span class="status-badge ${STATUS_CLASS[status]}">${STATUS_LABEL[status]}</span></td>
          <td>
            <button class="btn btn-ghost btn-sm" data-popup-edit='${JSON.stringify(p)}'>수정</button>
            <button class="btn btn-danger btn-sm" data-popup-del="${p.id}" style="margin-left:4px">삭제</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
  }

  /* ── 추가 버튼 ── */
  document.getElementById('btnAddPopup').addEventListener('click', () => {
    document.getElementById('modalPopupTitle').textContent = '팝업 추가';
    ['popupId','popupTitle','popupContent2','popupImage','popupLink','popupTargetPage','popupStartAt','popupEndAt'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('popupFrequency').value = 'session';
    document.getElementById('popupStatus').value = 'active';
    document.getElementById('modalPopup').classList.add('show');
  });

  /* ── 수정/삭제 이벤트 ── */
  document.addEventListener('click', async e => {
    const editBtn = e.target.closest('[data-popup-edit]');
    if (editBtn) {
      const p = JSON.parse(editBtn.dataset.popupEdit);
      document.getElementById('modalPopupTitle').textContent = '팝업 수정';
      document.getElementById('popupId').value = p.id;
      document.getElementById('popupTitle').value = p.title;
      document.getElementById('popupContent2').value = p.content || '';
      document.getElementById('popupImage').value = p.imageUrl || '';
      document.getElementById('popupLink').value = p.linkUrl || '';
      document.getElementById('popupTargetPage').value = p.targetPage || '';
      document.getElementById('popupFrequency').value = p.frequency || 'session';
      document.getElementById('popupStatus').value = p.isActive ? 'active' : 'inactive';
      document.getElementById('popupStartAt').value = p.startAt ? p.startAt.slice(0,10) : '';
      document.getElementById('popupEndAt').value = p.endAt ? p.endAt.slice(0,10) : '';
      document.getElementById('modalPopup').classList.add('show');
      return;
    }
    const delBtn = e.target.closest('[data-popup-del]');
    if (delBtn) {
      if (!confirm('이 팝업을 삭제하시겠습니까?')) return;
      const res = await api('/api/admin-popups/' + delBtn.dataset.popupDel, { method: 'DELETE' });
      if (res.ok) { toast('삭제되었습니다.'); load(); } else toast(res.data?.error || '삭제 실패');
    }
  });

  /* ── 저장 ── */
  document.getElementById('btnSavePopup').addEventListener('click', async () => {
    const id = document.getElementById('popupId').value;
    const body = {
      title: document.getElementById('popupTitle').value.trim(),
      content: document.getElementById('popupContent2').value.trim(),
      imageUrl: document.getElementById('popupImage').value.trim() || null,
      linkUrl: document.getElementById('popupLink').value.trim() || null,
      targetPage: document.getElementById('popupTargetPage').value.trim() || null,
      frequency: document.getElementById('popupFrequency').value,
      isActive: document.getElementById('popupStatus').value === 'active',
      startAt: document.getElementById('popupStartAt').value || null,
      endAt: document.getElementById('popupEndAt').value || null,
    };
    if (!body.title) { toast('제목은 필수입니다.'); return; }
    const res = id
      ? await api('/api/admin-popups/' + id, { method: 'PATCH', body })
      : await api('/api/admin-popups', { method: 'POST', body });
    if (!res.ok) { toast(res.data?.error || '저장 실패'); return; }
    toast('저장되었습니다.');
    document.getElementById('modalPopup').classList.remove('show');
    load();
  });

  /* ── 초기 로드 ── */
  load();
})();
</script>
</body>
</html>
