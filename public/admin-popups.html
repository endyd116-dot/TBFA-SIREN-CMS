<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팝업 관리 — SIREN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 14px; color: #1a2035; background: #f4f6fa; padding: 24px; min-height: 100vh; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .page-desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; }
    .action-bar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 10px 14px; background: #f9fafb; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 12px 14px; border-bottom: 1px solid #f0f2f5; color: #374151; vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f9fafb; }
    .status-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-scheduled { background: #dbeafe; color: #1e40af; }
    .btn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-primary { background: #1e40af; color: #fff; }
    .btn-primary:hover { background: #1e3a8a; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-ghost { background: #f3f4f6; color: #374151; }
    .btn-ghost:hover { background: #e5e7eb; }
    .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-outline:hover { background: #f9fafb; }

    /* ── 모달 ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-start; justify-content: center; padding: 30px 20px; overflow-y: auto; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; width: 100%; max-width: 820px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); margin: auto; }
    .modal-head { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
    .modal-head h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #6b7280; line-height: 1; }
    .modal-body { padding: 20px; }
    .modal-foot { padding: 14px 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px; }

    /* ── 2패널 레이아웃 ── */
    .modal-cols { display: flex; gap: 20px; align-items: flex-start; }
    .form-col { flex: 1 1 0; min-width: 0; }
    .preview-col { flex: 0 0 260px; }

    /* ── 폼 ── */
    .fg { margin-bottom: 12px; }
    .fg label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .fg input, .fg textarea, .fg select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; font-family: inherit; background: #fff; color: #1a2035; }
    .fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: #3b82f6; }
    .fg textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fg-hint { font-size: 11px; color: #9ca3af; margin-top: 3px; }

    /* ── 이미지 업로드 ── */
    .img-upload-zone {
      border: 2px dashed #d1d5db; border-radius: 8px; padding: 16px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      background: #fafafa; position: relative;
    }
    .img-upload-zone:hover, .img-upload-zone.drag { border-color: #3b82f6; background: #eff6ff; }
    .img-upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-upload-icon { font-size: 24px; margin-bottom: 4px; }
    .img-upload-text { font-size: 12px; color: #6b7280; }
    .img-preview-wrap { position: relative; border-radius: 6px; overflow: hidden; background: #f3f4f6; }
    .img-preview-wrap img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .img-remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 4px; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .upload-progress { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── 레이아웃 컨트롤 ── */
    .layout-ctrl { display: none; margin-top: 10px; padding: 10px 12px; background: #f0f4ff; border-radius: 7px; }
    .layout-ctrl.show { display: block; }
    .layout-ctrl-title { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 8px; }
    .layout-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .layout-btn { padding: 4px 10px; font-size: 11px; font-weight: 600; border: 1px solid #d1d5db; border-radius: 5px; cursor: pointer; background: #fff; color: #374151; transition: all 0.1s; }
    .layout-btn.active { background: #1e40af; color: #fff; border-color: #1e40af; }

    /* ── 콘텐츠 링크 피커 ── */
    .link-picker-toggle { font-size: 12px; color: #1e40af; cursor: pointer; text-decoration: underline; margin-top: 4px; display: inline-block; background: none; border: none; padding: 0; }
    .link-picker-panel { display: none; margin-top: 8px; border: 1px solid #e5e7eb; border-radius: 7px; overflow: hidden; max-height: 200px; overflow-y: auto; }
    .link-picker-panel.show { display: block; }
    .link-picker-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f2f5; font-size: 12px; transition: background 0.1s; }
    .link-picker-item:last-child { border-bottom: none; }
    .link-picker-item:hover { background: #eff6ff; }
    .link-picker-item .lp-label { font-size: 10px; color: #9ca3af; margin-bottom: 2px; }

    /* ── 미리보기 ── */
    .preview-label { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 8px; }
    .preview-area {
      background: #1a2035; border-radius: 8px; height: 320px;
      position: relative; overflow: hidden;
    }
    .preview-area::before {
      content: '미리보기 화면'; font-size: 10px; color: rgba(255,255,255,0.3);
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    }
    .preview-popup-box {
      position: absolute; bottom: 12px; right: 12px; width: 200px;
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); overflow: hidden;
      font-size: 11px; transition: all 0.2s;
    }
    .preview-popup-img { width: 100%; object-fit: cover; display: block; }
    .preview-popup-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 8px 8px 0; }
    .preview-popup-title { font-weight: 700; color: #1a2035; flex: 1; font-size: 11px; line-height: 1.3; }
    .preview-popup-x { background: none; border: none; color: #9ca3af; font-size: 14px; cursor: default; padding: 0; line-height: 1; }
    .preview-popup-body { padding: 4px 8px 0; color: #4b5563; font-size: 10.5px; line-height: 1.4; }
    .preview-popup-foot { padding: 6px 8px 8px; display: flex; justify-content: flex-end; }
    .preview-popup-today { font-size: 10px; background: #f3f4f6; color: #6b7280; border: none; border-radius: 4px; padding: 3px 7px; cursor: default; }

    /* ── 기타 ── */
    .empty-state { text-align: center; padding: 48px; color: #9ca3af; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 13px; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a2035; color: #fff; padding: 10px 22px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 640px) { .modal-cols { flex-direction: column; } .preview-col { flex: none; } }
  </style>
</head>
<body>

<h2>📢 팝업 관리</h2>
<p class="page-desc">사이트에 노출되는 팝업을 등록하고 관리합니다. 팝업은 우하단 플로팅 박스로 표시됩니다.</p>

<div class="action-bar">
  <button class="btn btn-primary" id="btnAddPopup">+ 팝업 추가</button>
</div>

<div class="card">
  <div id="popupListArea"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="modalPopup">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalPopupTitle">팝업 추가</h3>
      <button class="modal-close" id="btnCloseModal">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="popupId">
      <input type="hidden" id="popupImageUrl">

      <div class="modal-cols">
        <!-- 왼쪽: 폼 -->
        <div class="form-col">

          <div class="fg">
            <label>제목 <span style="color:#dc2626">*</span></label>
            <input type="text" id="popupTitle" placeholder="팝업 제목">
          </div>

          <div class="fg">
            <label>내용</label>
            <textarea id="popupContent2" rows="3" placeholder="팝업에 표시할 내용"></textarea>
          </div>

          <!-- 이미지 업로드 -->
          <div class="fg">
            <label>이미지</label>
            <div id="imgUploadZone" class="img-upload-zone">
              <input type="file" id="imgFileInput" accept="image/*">
              <div id="imgUploadPlaceholder">
                <div class="img-upload-icon">🖼️</div>
                <div class="img-upload-text">클릭하거나 파일을 여기에 드래그하세요<br><span style="font-size:11px;color:#9ca3af">JPG·PNG·GIF·WebP, 최대 20MB</span></div>
              </div>
              <div id="imgPreviewWrap" class="img-preview-wrap" style="display:none">
                <img id="imgPreviewThumb" src="" alt="미리보기">
                <button class="img-remove-btn" id="btnRemoveImg" type="button">×</button>
              </div>
            </div>
            <div id="imgUploadStatus" class="upload-progress"></div>
          </div>

          <!-- 레이아웃 컨트롤 (이미지 있을 때 표시) -->
          <div class="layout-ctrl" id="layoutCtrl">
            <div class="layout-ctrl-title">이미지 레이아웃</div>
            <div style="margin-bottom:6px">
              <div style="font-size:11px;color:#6b7280;margin-bottom:3px">높이</div>
              <div class="layout-btns" id="btnImgSize">
                <button class="layout-btn active" data-val="small">소 (120px)</button>
                <button class="layout-btn" data-val="medium">중 (160px)</button>
                <button class="layout-btn" data-val="large">대 (200px)</button>
                <button class="layout-btn" data-val="full">전체</button>
              </div>
            </div>
            <div>
              <div style="font-size:11px;color:#6b7280;margin-bottom:3px">정렬</div>
              <div class="layout-btns" id="btnImgAlign">
                <button class="layout-btn" data-val="left">좌측</button>
                <button class="layout-btn active" data-val="center">중앙</button>
                <button class="layout-btn" data-val="right">우측</button>
              </div>
            </div>
          </div>

          <!-- 링크 URL -->
          <div class="fg" style="margin-top:12px">
            <label>클릭 시 이동 URL</label>
            <input type="url" id="popupLink" placeholder="https://...">
            <button class="link-picker-toggle" id="btnLinkPicker" type="button">📋 사이트 콘텐츠에서 선택</button>
            <div class="link-picker-panel" id="linkPickerPanel">
              <div style="padding:8px 12px;font-size:11px;color:#9ca3af">불러오는 중...</div>
            </div>
          </div>

          <!-- 표시 페이지 -->
          <div class="fg">
            <label>표시 페이지</label>
            <input type="text" id="popupTargetPage" placeholder="/, /mypage.html (쉼표 구분)">
            <div class="fg-hint">비워두면 모든 페이지에 표시됩니다.</div>
          </div>

          <div class="fg-row">
            <div class="fg">
              <label>표시 빈도</label>
              <select id="popupFrequency">
                <option value="always">항상</option>
                <option value="session">세션당 1회</option>
                <option value="once_day" selected>하루 1회</option>
                <option value="weekly">주 1회</option>
              </select>
            </div>
            <div class="fg">
              <label>상태</label>
              <select id="popupStatus">
                <option value="active">활성</option>
                <option value="inactive">비활성</option>
              </select>
            </div>
          </div>

          <div class="fg-row">
            <div class="fg">
              <label>시작일 (선택)</label>
              <input type="date" id="popupStartAt">
            </div>
            <div class="fg">
              <label>종료일 (선택)</label>
              <input type="date" id="popupEndAt">
            </div>
          </div>
        </div>

        <!-- 오른쪽: 미리보기 -->
        <div class="preview-col">
          <div class="preview-label">미리보기 (우하단 플로팅)</div>
          <div class="preview-area">
            <div class="preview-popup-box" id="previewBox">
              <div id="previewImgWrap" style="display:none">
                <img id="previewImg" class="preview-popup-img" src="" alt="">
              </div>
              <div class="preview-popup-header">
                <div class="preview-popup-title" id="previewTitle">팝업 제목</div>
                <button class="preview-popup-x">×</button>
              </div>
              <div class="preview-popup-body" id="previewBody" style="display:none"></div>
              <div class="preview-popup-foot">
                <button class="preview-popup-today">오늘 하루 닫기</button>
              </div>
            </div>
          </div>
          <div style="font-size:11px;color:#9ca3af;margin-top:8px;line-height:1.5">
            실제 사이트에서는 우측 하단에<br>위와 같이 플로팅 박스로 표시됩니다.
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btnCancelModal">취소</button>
      <button class="btn btn-primary" id="btnSavePopup">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  'use strict';

  /* ── 레이아웃 상태 ── */
  let _imgSize = 'small';
  let _imgAlign = 'center';

  /* ── 유틸 ── */
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(function () { el.classList.remove('show'); }, 2500);
  }

  async function api(path, opts) {
    opts = opts || {};
    try {
      var r = await fetch(path, {
        method: opts.method || 'GET',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      var data = await r.json().catch(function () { return {}; });
      return { ok: r.ok, status: r.status, data };
    } catch (e) { return { ok: false, data: { error: e.message } }; }
  }

  function fmtDate(iso) { return iso ? iso.slice(0, 10) : '—'; }
  var FREQ_LABEL = { always: '항상', session: '세션 1회', daily: '하루 1회', once_day: '하루 1회', weekly: '주 1회' };
  var STATUS_MAP = { active: { cls: 'badge-active', txt: '활성' }, inactive: { cls: 'badge-inactive', txt: '비활성' }, scheduled: { cls: 'badge-scheduled', txt: '예약' } };

  /* ── 목록 로드 ── */
  async function load() {
    var el = document.getElementById('popupListArea');
    var res = await api('/api/admin-popups');
    var popups = (res.data?.data?.popups || res.data?.popups || []);
    if (!popups.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📢</div><p>등록된 팝업이 없습니다.</p></div>';
      return;
    }
    el.innerHTML = '<table class="data-table"><thead><tr><th>제목</th><th>대상 페이지</th><th>빈도</th><th>기간</th><th>상태</th><th>관리</th></tr></thead><tbody>'
      + popups.map(function (p) {
        var tp = Array.isArray(p.targetPages) ? p.targetPages.join(', ') : (p.targetPage || '전체');
        var now = new Date();
        var status = !p.isActive ? 'inactive' : (p.startAt && new Date(p.startAt) > now ? 'scheduled' : 'active');
        var sm = STATUS_MAP[status] || STATUS_MAP.inactive;
        var imgThumb = p.imageUrl ? '<img src="' + p.imageUrl + '" style="height:28px;border-radius:3px;vertical-align:middle;margin-right:6px" onerror="this.remove()">' : '';
        return '<tr><td>' + imgThumb + '<strong>' + esc(p.title) + '</strong></td>'
          + '<td style="font-size:11px;color:#6b7280">' + esc(tp) + '</td>'
          + '<td>' + (FREQ_LABEL[p.displayFrequency || p.frequency] || p.displayFrequency || '') + '</td>'
          + '<td style="font-size:12px">' + fmtDate(p.startAt) + ' ~ ' + fmtDate(p.endAt) + '</td>'
          + '<td><span class="status-badge ' + sm.cls + '">' + sm.txt + '</span></td>'
          + '<td><button class="btn btn-ghost btn-sm" data-edit=\'' + JSON.stringify(p).replace(/'/g, '&#39;') + '\'>수정</button>'
          + '<button class="btn btn-danger btn-sm" data-del="' + p.id + '" style="margin-left:4px">삭제</button></td></tr>';
      }).join('') + '</tbody></table>';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 모달 열기 / 닫기 ── */
  function openModal(popup) {
    document.getElementById('popupId').value = popup ? popup.id : '';
    document.getElementById('popupTitle').value = popup ? popup.title : '';
    document.getElementById('popupContent2').value = popup ? (popup.content || '') : '';
    document.getElementById('popupLink').value = popup ? (popup.linkUrl || '') : '';
    document.getElementById('popupTargetPage').value = popup && popup.targetPages
      ? (Array.isArray(popup.targetPages) ? popup.targetPages.filter(function(p){ return p !== '*'; }).join(', ') : popup.targetPages)
      : '';
    document.getElementById('popupFrequency').value = popup ? (popup.displayFrequency || popup.frequency || 'once_day') : 'once_day';
    document.getElementById('popupStatus').value = popup && !popup.isActive ? 'inactive' : 'active';
    document.getElementById('popupStartAt').value = popup && popup.startAt ? popup.startAt.slice(0,10) : '';
    document.getElementById('popupEndAt').value = popup && popup.endAt ? popup.endAt.slice(0,10) : '';
    document.getElementById('modalPopupTitle').textContent = popup ? '팝업 수정' : '팝업 추가';

    /* 이미지 */
    var imgUrl = popup ? (popup.imageUrl || '') : '';
    document.getElementById('popupImageUrl').value = imgUrl;
    if (imgUrl) {
      showImagePreview(imgUrl);
    } else {
      clearImagePreview();
    }

    /* 레이아웃 설정 복원 */
    var lc = popup && popup.layoutConfig ? popup.layoutConfig : {};
    setLayoutVal('ImgSize', lc.imgSize || 'small');
    setLayoutVal('ImgAlign', lc.imgAlign || 'center');

    /* 링크 피커 닫기 */
    document.getElementById('linkPickerPanel').classList.remove('show');

    document.getElementById('modalPopup').classList.add('show');
    updatePreview();
  }

  function closeModal() {
    document.getElementById('modalPopup').classList.remove('show');
  }

  document.getElementById('btnCloseModal').addEventListener('click', closeModal);
  document.getElementById('btnCancelModal').addEventListener('click', closeModal);
  document.getElementById('btnAddPopup').addEventListener('click', function () { openModal(null); });

  /* ── 목록 이벤트 위임 ── */
  document.addEventListener('click', async function (e) {
    var editBtn = e.target.closest('[data-edit]');
    if (editBtn) { openModal(JSON.parse(editBtn.dataset.edit.replace(/&#39;/g, "'"))); return; }

    var delBtn = e.target.closest('[data-del]');
    if (delBtn) {
      if (!confirm('이 팝업을 삭제하시겠습니까?')) return;
      var res = await api('/api/admin-popups?id=' + delBtn.dataset.del, { method: 'DELETE' });
      if (res.ok || res.data?.ok) { toast('삭제되었습니다.'); load(); }
      else toast(res.data?.error || '삭제 실패');
    }
  });

  /* ── 이미지 업로드 ── */
  function showImagePreview(url) {
    document.getElementById('imgUploadPlaceholder').style.display = 'none';
    document.getElementById('imgPreviewWrap').style.display = 'block';
    document.getElementById('imgPreviewThumb').src = url;
    document.getElementById('previewImgWrap').style.display = 'block';
    document.getElementById('previewImg').src = url;
    document.getElementById('layoutCtrl').classList.add('show');
    applyPreviewImgLayout();
  }

  function clearImagePreview() {
    document.getElementById('imgUploadPlaceholder').style.display = '';
    document.getElementById('imgPreviewWrap').style.display = 'none';
    document.getElementById('imgPreviewThumb').src = '';
    document.getElementById('popupImageUrl').value = '';
    document.getElementById('previewImgWrap').style.display = 'none';
    document.getElementById('previewImg').src = '';
    document.getElementById('layoutCtrl').classList.remove('show');
    document.getElementById('imgUploadStatus').textContent = '';
    document.getElementById('imgFileInput').value = '';
  }

  document.getElementById('btnRemoveImg').addEventListener('click', function (e) {
    e.preventDefault(); e.stopPropagation(); clearImagePreview();
  });

  var zone = document.getElementById('imgUploadZone');
  zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', function () { zone.classList.remove('drag'); });
  zone.addEventListener('drop', function (e) {
    e.preventDefault(); zone.classList.remove('drag');
    var f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });

  document.getElementById('imgFileInput').addEventListener('change', function (e) {
    var f = e.target.files[0];
    if (f) handleFile(f);
  });

  async function handleFile(file) {
    if (!file.type.startsWith('image/')) { toast('이미지 파일만 업로드할 수 있습니다.'); return; }
    var status = document.getElementById('imgUploadStatus');
    status.textContent = '업로드 중...';
    try {
      /* 1. presign */
      var res1 = await api('/api/blob-presign', {
        method: 'POST',
        body: { originalName: file.name, mimeType: file.type, sizeBytes: file.size, context: 'popup_image', isPublic: true },
      });
      if (!res1.ok) throw new Error(res1.data?.error || 'URL 요청 실패');
      var d1 = res1.data?.data || res1.data;
      /* 2. R2 PUT */
      var putRes = await fetch(d1.uploadUrl, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });
      if (!putRes.ok) throw new Error('R2 업로드 실패 (' + putRes.status + ')');
      /* 3. confirm */
      var res3 = await api('/api/blob-confirm', { method: 'POST', body: { id: d1.id } });
      if (!res3.ok) throw new Error(res3.data?.error || '확인 실패');
      var imgUrl = (res3.data?.data || res3.data)?.url;
      if (!imgUrl) throw new Error('이미지 URL 없음');
      document.getElementById('popupImageUrl').value = imgUrl;
      status.textContent = '✅ 업로드 완료';
      showImagePreview(imgUrl);
      updatePreview();
    } catch (err) {
      status.textContent = '❌ ' + err.message;
      toast('업로드 실패: ' + err.message);
    }
  }

  /* ── 레이아웃 버튼 ── */
  function setLayoutVal(group, val) {
    document.querySelectorAll('#btn' + group + ' .layout-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.val === val);
    });
    if (group === 'ImgSize') _imgSize = val;
    if (group === 'ImgAlign') _imgAlign = val;
  }

  function applyPreviewImgLayout() {
    var img = document.getElementById('previewImg');
    var sizeMap = { small: '80px', medium: '100px', large: '120px', full: '180px' };
    img.style.maxHeight = sizeMap[_imgSize] || '80px';
    img.style.objectPosition = _imgAlign;
  }

  document.getElementById('btnImgSize').addEventListener('click', function (e) {
    var b = e.target.closest('.layout-btn');
    if (!b) return;
    setLayoutVal('ImgSize', b.dataset.val);
    applyPreviewImgLayout(); updatePreview();
  });
  document.getElementById('btnImgAlign').addEventListener('click', function (e) {
    var b = e.target.closest('.layout-btn');
    if (!b) return;
    setLayoutVal('ImgAlign', b.dataset.val);
    applyPreviewImgLayout(); updatePreview();
  });

  /* ── 링크 피커 ── */
  var _linkLoaded = false;
  document.getElementById('btnLinkPicker').addEventListener('click', async function () {
    var panel = document.getElementById('linkPickerPanel');
    panel.classList.toggle('show');
    if (panel.classList.contains('show') && !_linkLoaded) {
      _linkLoaded = true;
      await loadLinkPickerItems();
    }
  });

  async function loadLinkPickerItems() {
    var panel = document.getElementById('linkPickerPanel');
    panel.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:#9ca3af">불러오는 중...</div>';

    var items = [];
    /* 캠페인 */
    try {
      var cr = await api('/api/admin/campaigns?limit=10');
      var cs = cr.data?.data?.list || cr.data?.list || cr.data?.data?.campaigns || cr.data?.campaigns || [];
      cs.forEach(function (c) {
        items.push({ label: '캠페인', title: c.title, url: '/campaign.html?id=' + c.id });
      });
    } catch (_) {}

    /* 공지 / 게시판 (있으면) */
    /* items.push({ label: '게시판', title: '...', url: '/board.html' }); */

    /* 기본 페이지 */
    [
      { label: '메인 페이지', url: '/' },
      { label: '후원 페이지', url: '/donate.html' },
      { label: '마이페이지', url: '/mypage.html' },
      { label: '캠페인 목록', url: '/campaigns.html' },
    ].forEach(function (x) { items.push({ label: '페이지', title: x.label, url: x.url }); });

    if (!items.length) {
      panel.innerHTML = '<div class="link-picker-item" style="color:#9ca3af">항목 없음</div>'; return;
    }

    panel.innerHTML = items.map(function (x) {
      return '<div class="link-picker-item" data-url="' + esc(x.url) + '">'
        + '<div class="lp-label">' + esc(x.label) + '</div>'
        + '<div>' + esc(x.title || x.url) + '</div></div>';
    }).join('');
  }

  document.addEventListener('click', function (e) {
    var item = e.target.closest('#linkPickerPanel .link-picker-item[data-url]');
    if (item) {
      document.getElementById('popupLink').value = item.dataset.url;
      document.getElementById('linkPickerPanel').classList.remove('show');
      updatePreview();
    }
  });

  /* ── 실시간 미리보기 ── */
  function updatePreview() {
    var title = document.getElementById('popupTitle').value || '팝업 제목';
    var content = document.getElementById('popupContent2').value || '';
    var imgUrl = document.getElementById('popupImageUrl').value;

    document.getElementById('previewTitle').textContent = title.slice(0, 40);
    var bodyEl = document.getElementById('previewBody');
    if (content) { bodyEl.style.display = ''; bodyEl.textContent = content.slice(0, 100); }
    else { bodyEl.style.display = 'none'; }

    if (imgUrl) {
      document.getElementById('previewImgWrap').style.display = 'block';
      document.getElementById('previewImg').src = imgUrl;
      applyPreviewImgLayout();
    } else {
      document.getElementById('previewImgWrap').style.display = 'none';
    }
  }

  ['popupTitle', 'popupContent2', 'popupLink'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', updatePreview);
  });

  /* ── 저장 ── */
  document.getElementById('btnSavePopup').addEventListener('click', async function () {
    var id = document.getElementById('popupId').value;
    var title = document.getElementById('popupTitle').value.trim();
    if (!title) { toast('제목은 필수입니다.'); return; }

    var targetRaw = document.getElementById('popupTargetPage').value.trim();
    var targetPages = targetRaw ? targetRaw.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : ['*'];

    var layoutConfig = {
      imgSize: _imgSize,
      imgAlign: _imgAlign,
    };

    var body = {
      title,
      content: document.getElementById('popupContent2').value.trim() || null,
      imageUrl: document.getElementById('popupImageUrl').value || null,
      linkUrl: document.getElementById('popupLink').value.trim() || null,
      targetPages,
      displayFrequency: document.getElementById('popupFrequency').value,
      isActive: document.getElementById('popupStatus').value === 'active',
      startAt: document.getElementById('popupStartAt').value || null,
      endAt: document.getElementById('popupEndAt').value || null,
      layoutConfig,
    };

    var res = id
      ? await api('/api/admin-popups?id=' + id, { method: 'PATCH', body })
      : await api('/api/admin-popups', { method: 'POST', body });

    if (!res.ok && !res.data?.ok) { toast(res.data?.error || '저장 실패'); return; }
    toast('저장되었습니다.');
    closeModal();
    load();
  });

  /* ── 초기 로드 ── */
  load();
})();
</script>
  <script src="/js/lib-kst.js?v=1" defer></script>
