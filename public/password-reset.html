<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>비밀번호 재설정 | 교사유가족협의회</title>
<meta name="robots" content="noindex,nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/pages.css">

<style>
  .pr-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .pr-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 36px 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }
  .pr-icon {
    text-align: center;
    font-size: 48px;
    margin-bottom: 16px;
  }
  .pr-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 8px;
    font-family: 'Noto Serif KR', serif;
  }
  .pr-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 28px;
    line-height: 1.7;
  }
  .pr-pw-meter {
    height: 4px;
    background: #f0f0f0;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .pr-pw-meter-bar {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .pr-hint {
    font-size: 11.5px;
    color: var(--text-3);
    margin-top: 6px;
    line-height: 1.5;
  }
  .pr-error {
    background: #fdecec;
    border: 1px solid #f5b5bb;
    color: #a01e2c;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .pr-success {
    background: #e7f7ec;
    border: 1px solid #a3d9b4;
    color: #1a5e2c;
    padding: 24px;
    border-radius: 8px;
    text-align: center;
    line-height: 1.7;
  }
  .pr-success-icon {
    font-size: 42px;
    margin-bottom: 12px;
  }
  .pr-back-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
  }
  .pr-back-link a {
    color: var(--brand);
    text-decoration: none;
  }
  .pr-back-link a:hover {
    text-decoration: underline;
  }
  .pr-info-box {
    background: #fff8ec;
    border: 1px solid #f0e3c4;
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8a6a00;
    line-height: 1.6;
    margin-bottom: 18px;
  }
</style>
</head>
<body data-page="password-reset">

  <div id="header-slot"></div>

  <main>
    <div class="pr-wrap">
      <div class="pr-card">
        <div class="pr-icon">🔑</div>
        <h1 class="pr-title">비밀번호 재설정</h1>
        <p class="pr-sub">
          새 비밀번호를 입력해 주세요.<br />
          보안을 위해 8자 이상의 영문+숫자 조합으로 설정해 주세요.
        </p>

        <div id="prError" class="pr-error"></div>

        <!-- 정상 폼 -->
        <div id="prFormBlock">
          <div class="pr-info-box">
            🔒 <strong>보안 안내</strong><br />
            • 한 번 변경 후에는 새 비밀번호로 다시 로그인해야 합니다<br />
            • 변경 직후 기존 잠금이 자동으로 해제됩니다
          </div>

          <form id="prForm">
            <div class="fg">
              <label>새 비밀번호</label>
              <input type="password" id="prPassword" required minlength="8" maxlength="100"
                     placeholder="8자 이상, 영문+숫자" autocomplete="new-password">
              <div class="pr-pw-meter"><div id="prMeterBar" class="pr-pw-meter-bar"></div></div>
              <div id="prStrength" class="pr-hint">비밀번호 강도: —</div>
            </div>
            <div class="fg">
              <label>비밀번호 확인</label>
              <input type="password" id="prPasswordConfirm" required
                     placeholder="다시 한 번 입력" autocomplete="new-password">
              <div id="prMatch" class="pr-hint"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="prSubmit">
              비밀번호 변경하기
            </button>
          </form>
          <div class="pr-back-link">
            <a href="/index.html">← 홈으로 돌아가기</a>
          </div>
        </div>

        <!-- 성공 화면 -->
        <div id="prSuccessBlock" style="display:none">
          <div class="pr-success">
            <div class="pr-success-icon">✅</div>
            <strong style="font-size:15px;color:#1a5e2c;">비밀번호가 변경되었습니다</strong><br />
            <span style="font-size:13px;">5초 후 홈으로 이동합니다...</span><br />
            <span style="font-size:12px;color:var(--text-3);margin-top:8px;display:inline-block">
              새 비밀번호로 로그인해 주세요
            </span>
          </div>
          <div class="pr-back-link">
            <a href="/index.html">지금 로그인하기 →</a>
          </div>
        </div>

        <!-- 토큰 무효 화면 -->
        <div id="prInvalidBlock" style="display:none">
          <div class="pr-success" style="background:#fdecec;border-color:#f5b5bb;color:#a01e2c">
            <div class="pr-success-icon">❌</div>
            <strong style="font-size:15px;">유효하지 않은 링크입니다</strong><br />
            <span style="font-size:13px;">
              링크가 만료되었거나 이미 사용되었을 수 있습니다.<br />
              다시 비밀번호 재설정을 요청해 주세요.
            </span>
          </div>
          <div class="pr-back-link">
            <a href="/index.html">홈으로 돌아가기</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="/js/common.js"></script>
  <script>
  (function () {
    'use strict';

    function $(id) { return document.getElementById(id); }

    function showError(msg) {
      var el = $('prError');
      if (!el) return;
      el.textContent = msg;
      el.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearError() {
      var el = $('prError');
      if (el) el.style.display = 'none';
    }

    /* 1. 토큰 추출 + 사전 검증 */
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token') || '';

    if (!token || token.length < 20) {
      $('prFormBlock').style.display = 'none';
      $('prInvalidBlock').style.display = 'block';
      return;
    }

    /* 2. 비밀번호 강도 측정 */
    function calcStrength(pw) {
      var score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/\d/.test(pw))    score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    var pwInput   = $('prPassword');
    var pwConfirm = $('prPasswordConfirm');
    var meterBar  = $('prMeterBar');
    var strengthEl = $('prStrength');
    var matchEl   = $('prMatch');

    pwInput.addEventListener('input', function () {
      var pw = pwInput.value;
      var s = calcStrength(pw);
      var pct = Math.min(100, (s / 6) * 100);
      meterBar.style.width = pct + '%';

      var color = '#dc2626', label = '약함';
      if (s >= 5)      { color = '#10b981'; label = '강함'; }
      else if (s >= 3) { color = '#f59e0b'; label = '보통'; }
      meterBar.style.background = color;
      strengthEl.textContent = '비밀번호 강도: ' + label;
      strengthEl.style.color = color;

      if (pwConfirm.value) {
        var match = pw === pwConfirm.value;
        matchEl.textContent = match ? '✓ 일치합니다' : '✗ 일치하지 않습니다';
        matchEl.style.color = match ? '#10b981' : '#dc2626';
      }
    });

    pwConfirm.addEventListener('input', function () {
      if (!pwConfirm.value) {
        matchEl.textContent = '';
        return;
      }
      var match = pwInput.value === pwConfirm.value;
      matchEl.textContent = match ? '✓ 일치합니다' : '✗ 일치하지 않습니다';
      matchEl.style.color = match ? '#10b981' : '#dc2626';
    });

    /* 3. 폼 제출 */
    $('prForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      var pw  = pwInput.value;
      var pw2 = pwConfirm.value;

      if (pw.length < 8) {
        return showError('비밀번호는 8자 이상이어야 합니다');
      }
      if (!/[A-Za-z]/.test(pw) || !/\d/.test(pw)) {
        return showError('영문과 숫자를 모두 포함해야 합니다');
      }
      if (pw !== pw2) {
        return showError('비밀번호가 일치하지 않습니다');
      }

      var btn = $('prSubmit');
      btn.disabled = true;
      btn.textContent = '변경 중...';

      try {
        var res = await fetch('/api/auth/password-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ token: token, password: pw }),
        });
        var data = await res.json().catch(function () { return {}; });

        if (res.ok && data.ok !== false) {
          $('prFormBlock').style.display = 'none';
          $('prSuccessBlock').style.display = 'block';
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(function () {
            window.location.href = '/index.html';
          }, 5000);
        } else if (res.status === 401) {
          $('prFormBlock').style.display = 'none';
          $('prInvalidBlock').style.display = 'block';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          showError(data.error || '처리 중 오류가 발생했습니다');
          btn.disabled = false;
          btn.textContent = '비밀번호 변경하기';
        }
      } catch (err) {
        console.error('[password-reset]', err);
        showError('네트워크 오류가 발생했습니다');
        btn.disabled = false;
        btn.textContent = '비밀번호 변경하기';
      }
    });
  })();
  </script>
</body>
</html>
