<!-- 메인 -->
<main class="wc-main">
  <header class="wc-header">
    <div class="wc-header-left">
      <h1 class="wc-title">📅 캘린더</h1>
      <span class="wc-subtitle">작업 마감일 + 일정 통합 보기</span>
    </div>
    <div class="wc-header-right">
      <label class="wc-filter-label">
        <input type="checkbox" id="wcFilterTasks" checked> 작업 표시
      </label>
      <label class="wc-filter-label">
        <input type="checkbox" id="wcFilterEvents" checked> 일정 표시
      </label>
      <label class="wc-filter-label">
        <input type="checkbox" id="wcFilterMemos" checked> 메모 표시
      </label>
      <select id="wcFilterScope" class="wc-select" aria-label="범위">
        <option value="mine">내 항목만</option>
        <option value="all">전체</option>
      </select>
      <button id="wcBtnNewMemo" class="wc-btn-icon" type="button" title="새 메모 작성" style="width:auto;padding:0 10px;background:#fff7ed;border-color:#fdba74;color:#9a3412;font-weight:600">📝 메모</button>
      <button id="wcBtnNewEvent" class="wc-btn-icon" type="button" title="새 일정 추가" style="width:auto;padding:0 10px;background:#eff6ff;border-color:#93c5fd;color:#1e40af;font-weight:600">📅 일정</button>
      <button id="wcBtnRefresh" class="wc-btn-icon" type="button" title="새로고침">🔄</button>
      <button id="wcBtnGcalConnect" class="wc-btn-icon" type="button" title="구글 캘린더 연동" style="width:auto;padding:0 10px;background:#f0fdf4;border-color:#86efac;color:#166534;font-weight:600;display:none">🔗 구글 연동</button>
      <button id="wcBtnGcalSync" class="wc-btn-icon" type="button" title="구글 캘린더 동기화" style="width:auto;padding:0 10px;background:#f0fdf4;border-color:#86efac;color:#166534;font-weight:600;display:none">🔄 구글 동기화</button>
    </div>
  </header>

  <section class="wc-board">
    <div id="wcCalendar" class="wc-calendar"></div>
  </section>

  <div id="wcLoading" class="wc-loading" style="display:none">불러오는 중...</div>
</main>

<!-- ════════════════════════════════════════════════════
     모달: 일정 상세 (간단)
═════════════════════════════════════════════════════ -->
<div class="wk-modal" id="wcEventModal" aria-hidden="true">
  <div class="wk-modal-backdrop" data-close-modal="wcEventModal"></div>
  <div class="wk-modal-dialog wk-modal-sm">
    <header class="wk-modal-header">
      <h2 id="wcEventModalTitle">일정</h2>
      <button class="wk-modal-close" data-close-modal="wcEventModal" type="button">✕</button>
    </header>
    <div class="wk-modal-body">
      <div id="wcEventContent">
        <p id="wcEventTime" class="wc-event-time"></p>
        <p id="wcEventLocation" class="wc-event-loc"></p>
        <p id="wcEventDesc" class="wc-event-desc"></p>
      </div>
      <div id="wcRsvpSection" style="margin-top:16px;border-top:1px solid #e5e7eb;padding-top:14px">
        <p style="font-size:12px;color:#6b7280;margin:0 0 8px">참석 여부</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="wcRsvpYes" class="wk-btn-secondary" type="button" data-rsvp="yes">✓ 참석 예정</button>
          <button id="wcRsvpNo" class="wk-btn-secondary" type="button" data-rsvp="no">✗ 불참</button>
          <button id="wcRsvpMaybe" class="wk-btn-secondary" type="button" data-rsvp="maybe">? 미정</button>
        </div>
        <p id="wcRsvpSummary" style="font-size:12px;color:#6b7280;margin:8px 0 0"></p>
      </div>
    </div>
    <footer class="wk-modal-footer">
      <span class="wk-spacer"></span>
      <button class="wk-btn-secondary" data-close-modal="wcEventModal" type="button">닫기</button>
    </footer>
  </div>
</div>
