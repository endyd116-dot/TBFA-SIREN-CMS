<style>
.notify-page { max-width: 760px; margin: 0 auto; padding: 32px 16px 80px; }
.notify-page h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.notify-page .subtitle { color: var(--ink-60, #666); margin-bottom: 32px; font-size: 0.9rem; }

.phone-alert {
  background: #fff8e1;
  border: 1px solid #ffc107;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 24px;
  font-size: 0.875rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.phone-alert a { color: var(--primary, #1e40af); font-weight: 600; text-decoration: underline; }

.notify-table-wrap {
  background: #fff;
  border: 1px solid var(--line, #e5e7eb);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}
.notify-table {
  width: 100%;
  border-collapse: collapse;
}
.notify-table thead th {
  background: var(--bg-soft, #f8fafc);
  padding: 12px 16px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--ink-60, #666);
  text-align: center;
  border-bottom: 1px solid var(--line, #e5e7eb);
}
.notify-table thead th:first-child { text-align: left; }
.notify-table tbody tr {
  border-bottom: 1px solid var(--line, #e5e7eb);
  transition: background 0.12s;
}
.notify-table tbody tr:last-child { border-bottom: none; }
.notify-table tbody tr:hover { background: var(--bg-hover, #f1f5f9); }
.notify-table td {
  padding: 14px 16px;
  vertical-align: middle;
}
.event-label { font-size: 0.9rem; font-weight: 500; }
.event-cat {
  font-size: 0.75rem;
  color: var(--ink-60, #888);
  margin-top: 2px;
}
.notify-table td.ch-cell { text-align: center; }

.ch-checkbox-wrap {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.ch-checkbox-wrap input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--primary, #1e40af);
  cursor: pointer;
}
.ch-checkbox-wrap input[type="checkbox"]:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.forced-badge {
  font-size: 0.65rem;
  background: #fee2e2;
  color: #b91c1c;
  padding: 1px 5px;
  border-radius: 4px;
  white-space: nowrap;
}
.unavail-badge {
  font-size: 0.65rem;
  background: #f1f5f9;
  color: #94a3b8;
  padding: 1px 5px;
  border-radius: 4px;
  white-space: nowrap;
}

.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  background: var(--primary, #1e40af);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.save-btn:hover { background: #1d3fa8; }
.save-btn:disabled { background: #94a3b8; cursor: not-allowed; }

.reset-link {
  margin-left: 12px;
  font-size: 0.85rem;
  color: var(--ink-60, #888);
  cursor: pointer;
  text-decoration: underline;
}

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1e293b; color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 0.875rem;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #b91c1c; }

.section-title {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-60, #888);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 10px 16px 6px;
  background: var(--bg-soft, #f8fafc);
  border-bottom: 1px solid var(--line, #e5e7eb);
}

.skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  border-radius: 6px; height: 40px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
