<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>익명 보호 감사 로그 | SIREN 어드민</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Noto Sans KR', sans-serif;
  background: #f1f5f9; color: #1e293b;
}
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }
.page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
.page-desc  { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
.back-link  { display: inline-block; color: #1e40af; font-size: 0.85rem; margin-bottom: 12px; text-decoration: none; }
.back-link:hover { text-decoration: underline; }

.info-box {
  background: #fef9f0; border: 1px solid #fbbf24; border-radius: 10px;
  padding: 14px 18px; margin-bottom: 20px; font-size: 13.5px; color: #92400e;
  display: flex; gap: 10px; align-items: flex-start;
}
.info-box .icon { font-size: 18px; flex-shrink: 0; }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  padding: 14px 16px; margin-bottom: 16px;
}
.filter-bar label { font-size: 0.825rem; color: #475569; display: flex; align-items: center; gap: 6px; }
.filter-bar select, .filter-bar input {
  padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
  font-size: 0.85rem; font-family: inherit; background: #fff;
}
.filter-bar .spacer { flex: 1; }
.btn {
  padding: 7px 14px; border: 1px solid #cbd5e1; background: #fff;
  border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-family: inherit; color: #1e293b;
}
.btn:hover { background: #f8fafc; }
.btn-primary { background: #1e40af; color: #fff; border-color: #1e40af; }
.btn-primary:hover { background: #1d3fa8; }

.table-wrap {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  overflow: hidden; margin-bottom: 16px;
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  background: #f8fafc; padding: 11px 12px; font-size: 0.78rem;
  font-weight: 600; color: #64748b; text-align: left; border-bottom: 1px solid #e2e8f0;
}
.tbl tbody tr { border-bottom: 1px solid #f1f5f9; }
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody td { padding: 10px 12px; font-size: 0.85rem; vertical-align: middle; }
.tbl tbody tr:hover { background: #f8fafc; }

.badge {
  display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 500;
}
.badge-level-1 { background: #fef3c7; color: #92400e; }
.badge-level-2 { background: #fee2e2; color: #991b1b; }
.badge-incident  { background: #eff6ff; color: #1e40af; }
.badge-harassment { background: #fff7ed; color: #c2410c; }
.badge-legal     { background: #f5f3ff; color: #6d28d9; }

.reason-cell {
  max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #475569; cursor: help;
}

.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
}
.kpi-card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  padding: 16px 20px;
}
.kpi-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 700; color: #1e293b; }
.kpi-sub   { font-size: 11.5px; color: #94a3b8; margin-top: 4px; }

.pagination { display: flex; justify-content: center; gap: 4px; }
.pagination button {
  padding: 6px 12px; border: 1px solid #e2e8f0; background: #fff;
  border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-family: inherit;
}
.pagination button.active { background: #1e40af; color: #fff; border-color: #1e40af; }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
.empty-msg { text-align: center; padding: 48px 20px; color: #94a3b8; font-size: 14px; }

.admin-name { font-weight: 600; }
.report-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="page-wrap">
  <a href="/admin-anon-reveal.html" class="back-link">← 신원 식별 화면으로</a>

  <div class="page-title">📋 익명 보호 감사 로그</div>
  <div class="page-desc">어드민이 익명 신고의 신원을 식별한 모든 기록입니다.</div>

  <div class="info-box">
    <span class="icon">🛡️</span>
    <span>이 로그는 개인정보 보호법 준수 목적으로 보관됩니다. 불필요한 신원 조회는 내부 정책 위반에 해당할 수 있습니다. 모든 조회는 담당자 ID와 사유와 함께 기록됩니다.</span>
  </div>

  <!-- 통계 KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">전체 조회 건수</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <div class="kpi-sub">누적</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">오늘 조회</div>
      <div class="kpi-value" id="kpiToday">—</div>
      <div class="kpi-sub">금일 기준</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">2단계(전체) 조회</div>
      <div class="kpi-value" id="kpiLevel2">—</div>
      <div class="kpi-sub">높은 위험도</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">이달 조회</div>
      <div class="kpi-value" id="kpiMonth">—</div>
      <div class="kpi-sub">이번 달</div>
    </div>
  </div>

  <div class="filter-bar">
    <label>
      담당자
      <input type="text" id="filterAdmin" placeholder="담당자 이름..." style="width:140px">
    </label>
    <label>
      식별 수준
      <select id="filterLevel">
        <option value="">전체</option>
        <option value="1">1단계</option>
        <option value="2">2단계</option>
      </select>
    </label>
    <label>
      신고 유형
      <select id="filterType">
        <option value="">전체</option>
        <option value="incident">사건 제보</option>
        <option value="harassment">악성민원</option>
        <option value="legal">법률지원</option>
      </select>
    </label>
    <label>
      기간
      <input type="date" id="filterDateFrom" style="width:130px">
    </label>
    <label>~
      <input type="date" id="filterDateTo" style="width:130px">
    </label>
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="loadAuditLog(1)">🔍 조회</button>
    <button class="btn" onclick="exportCsv()">📥 CSV 내보내기</button>
  </div>

  <div class="table-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th>로그 ID</th>
          <th>담당자</th>
          <th>신고 유형</th>
          <th>신고 제목</th>
          <th>식별 수준</th>
          <th>사유</th>
          <th>조회 일시</th>
        </tr>
      </thead>
      <tbody id="auditBody">
        <tr><td colspan="7" class="empty-msg">조회 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="pagination" class="pagination"></div>
</div>

<script src="/js/common.js?v=6"></script>
<script src="/js/auth.js?v=6"></script>
<script src="/js/admin-anon-audit.js?v=1"></script>
</body>
</html>
