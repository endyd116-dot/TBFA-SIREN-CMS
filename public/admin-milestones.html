<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>성과 관리 | 어드민</title>
<link rel="stylesheet" href="/css/base.css?v=3">
<link rel="stylesheet" href="/css/components.css?v=3">
<link rel="stylesheet" href="/css/workspace-milestones.css?v=2">
<style>
body { margin:0; padding:20px 24px; font-family:'Noto Sans KR',sans-serif; background:#f9fafb; }
.adm-tabs { display:flex; gap:4px; border-bottom:2px solid #e5e7eb; margin-bottom:20px; }
.adm-tab  { padding:8px 16px; font-size:13.5px; font-weight:500; border:none; background:none;
            cursor:pointer; color:#6b7280; border-bottom:2px solid transparent; margin-bottom:-2px; }
.adm-tab.active { color:#3b82f6; border-bottom-color:#3b82f6; font-weight:600; }
.adm-panel { display:none; }
.adm-panel.active { display:block; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12.5px; color:#6b7280; margin-bottom:4px; font-weight:500; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:9px 12px; border:1px solid #e5e7eb; border-radius:8px;
  font-size:13.5px; box-sizing:border-box; background:#fff; }
.card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:20px; margin-bottom:16px; }
</style>
</head>
<body>
<h2 style="margin:0 0 16px;font-size:18px;font-weight:700">🏆 성과 관리 (슈퍼어드민)</h2>

<div class="adm-tabs">
  <button class="adm-tab active" data-panel="defs">📋 마일스톤 정의</button>
  <button class="adm-tab" data-panel="quarters">🗓 분기 관리</button>
  <button class="adm-tab" data-panel="settlements">✅ 결산 승인</button>
  <button class="adm-tab" data-panel="roles">👥 담당 역할 설정</button>
</div>

<!-- 마일스톤 정의 패널 -->
<div id="panelDefs" class="adm-panel active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="display:flex;gap:8px">
      <!-- R39 Stage 3: 옵션은 admin-milestones.js에서 /api/milestone-roles 응답으로 동적 채움 -->
      <select id="defRoleFilter" style="padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px">
        <option value="">전체 역할</option>
      </select>
      <select id="defCatFilter" style="padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px">
        <option value="">전체 카테고리</option>
        <option value="REVENUE_LINKED">매출연동</option>
        <option value="NON_REVENUE">비매출</option>
      </select>
    </div>
    <button class="ms-btn ms-btn-primary ms-btn-sm" id="btnNewDef">+ 신규 등록</button>
  </div>
  <div id="defsList"></div>
</div>

<!-- 분기 관리 패널 -->
<div id="panelQuarters" class="adm-panel">
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="ms-btn ms-btn-primary ms-btn-sm" id="btnNewQuarter">+ 분기 추가</button>
  </div>
  <div id="quartersList"></div>
</div>

<!-- 결산 승인 패널 -->
<div id="panelSettlements" class="adm-panel">
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <select id="settlQuarterFilter" style="padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px">
      <option value="">전체 분기</option>
    </select>
    <select id="settlStatusFilter" style="padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px">
      <option value="SUBMITTED">검토 대기</option>
      <option value="">전체</option>
      <option value="APPROVED">승인됨</option>
      <option value="PAID">지급 완료</option>
    </select>
    <button class="ms-btn ms-btn-ghost ms-btn-sm" id="btnReloadSettlements">새로고침</button>
    <button class="ms-btn ms-btn-primary ms-btn-sm" id="btnExportSalary" style="margin-left:auto">📥 급여 내보내기</button>
  </div>
  <div id="settlementsList"></div>

  <!-- AI 인사이트 패널 -->
  <div style="margin-top:28px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0;font-size:15px;font-weight:700">🤖 AI 분기 인사이트</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="ms-btn ms-btn-ghost ms-btn-sm" id="btnAiSummary">📊 AI 분기 요약</button>
        <button class="ms-btn ms-btn-ghost ms-btn-sm" id="btnAiAnomaly">🔍 이상 탐지</button>
        <button class="ms-btn ms-btn-ghost ms-btn-sm" id="btnAiRecommend">💡 다음 분기 추천</button>
      </div>
    </div>
    <div id="aiInsightResult" style="min-height:60px;font-size:13.5px;color:#6b7280;line-height:1.7">
      위 버튼을 클릭하면 AI가 분기 데이터를 분석합니다.
    </div>
  </div>
</div>

<!-- 담당 역할 설정 패널 -->
<div id="panelRoles" class="adm-panel">
  <p style="font-size:13px;color:#6b7280;margin-bottom:16px">각 운영자·어드민에게 마일스톤 담당 역할을 설정합니다.</p>
  <div id="rolesList"></div>
</div>

<!-- 마일스톤 등록/수정 모달 -->
<div id="defModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;overflow:auto">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:600px;margin:40px auto">
    <h3 style="margin:0 0 16px;font-size:16px;font-weight:700" id="defModalTitle">마일스톤 등록</h3>
    <div class="form-row">
      <div class="form-group"><label>코드 (예: sm-001)</label><input id="fCode" maxlength="20"></div>
      <div class="form-group"><label>담당 역할</label>
        <!-- R39 Stage 3: 옵션은 admin-milestones.js에서 /api/milestone-roles 응답으로 동적 채움 -->
        <select id="fRole"></select>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>이름</label><input id="fName" maxlength="200"></div>
      <div class="form-group"><label>카테고리</label>
        <select id="fCategory">
          <option value="REVENUE_LINKED">매출연동</option>
          <option value="NON_REVENUE">비매출</option>
        </select>
      </div>
      <div class="form-group"><label>사업체</label>
        <select id="fBU"><option value="ASSOCIATION">협의회</option><option value="HAMKEWORK">함께워크ON</option><option value="PLEO">플레오</option><option value="POLICY">정책</option></select>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>매출 원천 (선택)</label><input id="fRevSrc" placeholder="예: regular_donation"></div>
    </div>
    <div style="margin-bottom:12px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;cursor:pointer">
        <input type="checkbox" id="fThrEnabled"> 임계점 적용
      </label>
    </div>
    <div id="thrFields" style="display:none">
      <div class="form-row">
        <div class="form-group"><label>임계점 값</label><input type="number" id="fThrVal" step="any"></div>
        <div class="form-group"><label>단위 (명/원/팀)</label><input id="fThrUnit" maxlength="20"></div>
      </div>
    </div>
    <div class="form-group"><label>인센티브 공식 (JSON)</label>
      <textarea id="fFormula" rows="4" placeholder='{"type":"FLAT","unitAmount":60000}'></textarea>
      <div style="font-size:11.5px;color:#9ca3af;margin-top:4px">FLAT: unitAmount | PERCENT: rate | BRACKET: brackets[] | EVENT_RANGE: minAmount, maxAmount</div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>분기 한정 (비매출)</label>
        <select id="fQApplicable"><option value="">해당없음(매출연동)</option><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="ALL">전체</option></select>
      </div>
      <div class="form-group"><label>정렬 순서</label><input type="number" id="fSortOrder" value="0"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button class="ms-btn ms-btn-ghost" id="defModalClose">취소</button>
      <button class="ms-btn ms-btn-primary" id="defModalSave">저장</button>
    </div>
  </div>
</div>

<!-- 분기 추가 모달 -->
<div id="quarterModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:400px;margin:80px auto">
    <h3 style="margin:0 0 16px;font-size:16px;font-weight:700">분기 추가</h3>
    <div class="form-row">
      <div class="form-group"><label>연도</label><input type="number" id="qYear" value="2025"></div>
      <div class="form-group"><label>분기 (1-4)</label><input type="number" id="qQ" min="1" max="4" value="1"></div>
      <div class="form-group"><label>시작일</label><input type="date" id="qStart"></div>
      <div class="form-group"><label>종료일</label><input type="date" id="qEnd"></div>
      <div class="form-group" style="grid-column:1/-1"><label>결산일</label><input type="date" id="qSettle"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button class="ms-btn ms-btn-ghost" id="quarterModalClose">취소</button>
      <button class="ms-btn ms-btn-primary" id="quarterModalSave">저장</button>
    </div>
  </div>
</div>

<div id="amToast" style="position:fixed;bottom:24px;right:24px;z-index:99999"></div>

<script src="/js/lib-kst.js?v=1" defer></script>
<script src="/js/lib-milestone-roles.js?v=1-r39" defer></script>
<script src="/js/admin-milestones.js?v=5-r39" defer></script>
</body>
</html>
