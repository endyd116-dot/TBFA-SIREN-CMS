<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>소식 / 참여 | 교사유가족협의회</title>
<meta name="description" content="공지사항 · 언론보도 · 자주 묻는 질문 — 교사유가족협의회의 소식을 만나보세요.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/home.css">
<link rel="stylesheet" href="/css/pages.css">
<link rel="stylesheet" href="/css/activity.css?v=m11">

<style>
  /* ===== ★ K-5: 동적 공지/FAQ ===== */
  .news-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .news-tabs .tab-btn {
    padding: 10px 20px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text-2);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .news-tabs .tab-btn:hover {
    border-color: var(--brand);
    color: var(--brand);
  }
  .news-tabs .tab-btn.on {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }

  .news-table tbody tr { cursor: pointer; transition: background 0.1s; }
  .news-table tbody tr:hover { background: var(--bg-soft); }

  .news-pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 30px;
    flex-wrap: wrap;
  }
  .news-pagination button {
    width: 36px;
    height: 36px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text-2);
    border-radius: 5px;
    cursor: pointer;
    font-size: 12.5px;
    padding: 0;
  }
  .news-pagination button.active {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
    font-weight: 700;
  }
  .news-pagination button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .news-pagination button:hover:not(.active):not(:disabled) {
    background: var(--bg-soft);
  }

  /* 공지 상세 모달 */
  #noticeViewModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 9999;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  #noticeViewModal.show { display: flex; }
  #noticeViewModal .modal-content {
    background: #fff;
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    margin: auto;
  }
  #noticeViewModal .modal-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }
  #noticeViewModal .modal-header .nv-title-wrap { flex: 1; }
  #noticeViewModal .modal-header h3 {
    margin: 0 0 6px;
    font-size: 18px;
    font-family: 'Noto Serif KR', serif;
    line-height: 1.5;
  }
  #noticeViewModal .modal-header .nv-meta {
    font-size: 12px;
    color: var(--text-3);
  }
  #noticeViewModal .modal-close {
    background: transparent;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--text-3);
    line-height: 1;
    flex-shrink: 0;
  }
  #noticeViewModal .modal-body {
    padding: 24px 28px;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text-1);
  }
  #noticeViewModal .modal-body img { max-width: 100%; height: auto; }

  .nv-loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
    font-size: 13px;
  }
</style>
</head>
<body data-page="news">

  <div id="header-slot"></div>

  <main>

    <section class="page-hero">
      <div class="container">
        <h1>소식 / 참여</h1>
        <p>공지사항 · 언론보도 · FAQ</p>
      </div>
    </section>

    <div class="container breadcrumb">
      <a href="/index.html">홈</a> &nbsp;›&nbsp; 소식 / 참여 &nbsp;›&nbsp; 공지사항
    </div>

    <!-- 공지사항 -->
    <section class="block" id="notice" style="padding-bottom:0">
      <div class="container">

        <!-- 카테고리 탭 -->
        <div class="news-tabs" id="newsTabs">
          <button type="button" class="tab-btn on" data-cat="">전체</button>
          <button type="button" class="tab-btn" data-cat="general">단체공지</button>
          <button type="button" class="tab-btn" data-cat="member">회원공지</button>
          <button type="button" class="tab-btn" data-cat="event">사업안내</button>
          <button type="button" class="tab-btn" data-cat="media">언론보도</button>
        </div>

        <div class="panel" style="padding:0;overflow:hidden">
          <table class="tbl news-table">
            <thead>
              <tr>
                <th style="width:80px">번호</th>
                <th style="width:130px">분류</th>
                <th>제목</th>
                <th style="width:130px">작성일</th>
                <th style="width:80px">조회</th>
              </tr>
            </thead>
            <tbody id="newsTableBody">
              <tr>
                <td colspan="5" style="text-align:center;padding:60px;color:var(--text-3);font-size:13px">
                  공지사항을 불러오는 중...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="news-pagination" id="newsPagination" style="display:none">
          <!-- JS 동적 생성 -->
        </div>
      </div>
    </section>

    <!-- ★ M-11: 언론보도 / 갤러리 -->
    <section class="block" id="media" style="padding-top:0">
      <div class="container">
        <div class="sec-head" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:18px">
          <div>
            <div class="sec-eyebrow">PRESS & GALLERY</div>
            <div class="sec-title">언론보도 / 갤러리</div>
          </div>
          <div class="act-cat-tabs" id="mediaCatTabs" style="margin-left:0">
            <button type="button" class="act-cat-tab on" data-mc="">전체</button>
            <button type="button" class="act-cat-tab" data-mc="press">📰 언론보도</button>
            <button type="button" class="act-cat-tab" data-mc="photo">📷 사진</button>
            <button type="button" class="act-cat-tab" data-mc="event">🎯 행사</button>
          </div>
        </div>

        <div id="mediaGrid">
          <div style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">언론보도/갤러리를 불러오는 중...</div>
        </div>
      </div>
    </section>


    <!-- FAQ -->
    <section class="block" id="faq" style="background:var(--bg-soft)">
      <div class="container">
        <div class="sec-head" style="justify-content:center;text-align:center;flex-direction:column;align-items:center">
          <div>
            <div class="sec-eyebrow">HELP CENTER</div>
            <div class="sec-title">자주 묻는 질문</div>
          </div>
        </div>

        <div style="max-width:880px;margin:0 auto" id="faqContainer">
          <div style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">
            FAQ를 불러오는 중...
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ★ K-5: 공지 상세 모달 -->
  <div id="noticeViewModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="nv-title-wrap">
          <h3 id="nvTitle">불러오는 중...</h3>
          <div class="nv-meta" id="nvMeta">—</div>
        </div>
        <button class="modal-close" type="button" data-nv-close>&times;</button>
      </div>
      <div class="modal-body" id="nvBody">
        <div class="nv-loading">잠시만 기다려 주세요...</div>
      </div>
    </div>
  </div>

  <div id="modals-slot"></div>
  <div id="footer-slot"></div>

  <script src="/js/common.js?v=3"></script>
  <script src="/js/auth.js?v=5"></script>
  <script src="/js/news.js?v=2"></script>
  <script src="/js/news-media.js?v=m11"></script>
  <script src="/js/support.js?v=4"></script>
  <script src="/js/home.js?v=3"></script>
  <script src="/js/donate.js?v=4"></script>
</body>
</html>
