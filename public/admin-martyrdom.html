<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>순직 인정 지원 | 관리자</title>
<meta name="robots" content="noindex,nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: 'Noto Sans KR', sans-serif;
  background: #f1f5f9; color: #1e293b; min-height: 100vh; font-size: 13px;
}

/* ─ 상단바 ─ */
.topbar {
  background: #1e293b; color: #fff;
  padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
.topbar-right { display: flex; gap: 12px; align-items: center; }
.topbar a { color: #cbd5e1; text-decoration: none; font-size: 12px; }

/* ─ 레이아웃: 마스터-디테일 ─ */
.main-layout {
  display: flex; height: calc(100vh - 45px);
}
.case-sidebar {
  width: 280px; min-width: 220px; background: #fff;
  border-right: 1px solid #e2e8f0; display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px 14px; border-bottom: 1px solid #e2e8f0;
  display: flex; flex-direction: column; gap: 8px;
}
.sidebar-header h2 { margin: 0; font-size: 14px; font-weight: 600; }
.kind-toggle { display: flex; gap: 4px; }
.kind-btn {
  flex: 1; padding: 5px 0; border: 1px solid #cbd5e1; background: #f8fafc;
  border-radius: 5px; font-size: 12px; cursor: pointer; text-align: center;
}
.kind-btn.active { background: #1e40af; color: #fff; border-color: #1e40af; font-weight: 600; }
.case-list { flex: 1; overflow-y: auto; }
.case-item {
  padding: 12px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  transition: background .15s;
}
.case-item:hover { background: #f8fafc; }
.case-item.active { background: #eff6ff; border-left: 3px solid #2563eb; }
.case-item-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #1e293b; }
.case-item-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; color: #64748b; align-items: center; }
.list-loading, .list-empty { padding: 24px; text-align: center; color: #94a3b8; font-size: 13px; }
.sidebar-footer { padding: 10px 14px; border-top: 1px solid #e2e8f0; }

/* ─ 상세 패널 ─ */
.detail-pane {
  flex: 1; overflow-y: auto; padding: 0;
  background: #f8fafc; display: flex; flex-direction: column;
}
#detailPane { flex: 1; }
.empty-detail {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: #94a3b8;
}
.empty-detail .empty-icon { font-size: 48px; }

/* ─ 상세 헤더 ─ */
.detail-header {
  background: #fff; padding: 16px 20px;
  border-bottom: 1px solid #e2e8f0;
}
.detail-title { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.case-no { font-size: 12px; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
.case-title { font-size: 16px; font-weight: 700; color: #1e293b; }
.detail-meta-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; }
.detail-meta-row label, .detail-procedure-row label { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 6px; }
.detail-meta-row select, .detail-procedure-row select {
  border: 1px solid #cbd5e1; border-radius: 5px; padding: 4px 8px;
  font-size: 12px; cursor: pointer; background: #fff;
}
.detail-procedure-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
  padding-top: 10px; border-top: 1px solid #f1f5f9;
}
.deadline-info { font-size: 12px; color: #475569; display: flex; align-items: center; gap: 6px; }
.deadline-date { color: #64748b; }
.dday-badge {
  background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
  padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600;
}

/* ─ 탭 바 ─ */
.tab-bar {
  display: flex; background: #fff; border-bottom: 2px solid #e2e8f0;
  padding: 0 20px;
}
.tab-btn {
  padding: 10px 16px; border: none; background: none; font-size: 13px;
  cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px;
  font-family: inherit; font-weight: 500; transition: color .15s;
}
.tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
.tab-btn:hover:not(.active) { color: #1e293b; }

/* ─ 탭 패널 ─ */
#tab-content { flex: 1; }
.tab-panel { padding: 20px; }

/* ─ placeholder ─ */
.placeholder-box {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 300px; gap: 12px; text-align: center;
  background: #fff; border: 2px dashed #e2e8f0; border-radius: 10px; padding: 40px;
}
.placeholder-icon { font-size: 40px; }
.placeholder-title { font-size: 16px; font-weight: 600; color: #475569; }
.placeholder-desc { font-size: 13px; color: #94a3b8; max-width: 420px; line-height: 1.6; }

/* ─ 배너 ─ */
.progress-banner {
  background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
  padding: 8px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 12px;
}
.error-banner {
  background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
  padding: 8px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 12px;
}
.alert-banner {
  padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; font-weight: 500;
}
.expert-warning {
  background: #fff7ed; border: 1px solid #fed7aa; color: #92400e;
}

/* ─ 업로드 영역 ─ */
.upload-area { margin-bottom: 16px; }
.upload-label {
  display: flex; align-items: center; gap: 14px;
  border: 2px dashed #cbd5e1; border-radius: 8px; padding: 16px 20px;
  cursor: pointer; background: #fff; transition: border-color .15s;
}
.upload-label:hover { border-color: #2563eb; background: #eff6ff; }
.upload-icon { font-size: 24px; }
.upload-text { font-size: 13px; color: #475569; line-height: 1.6; }
.upload-text small { color: #94a3b8; }

/* ─ 자료 테이블 ─ */
.doc-table-wrap { background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; }
.doc-table { width: 100%; border-collapse: collapse; }
.doc-table th {
  background: #f8fafc; padding: 8px 12px; text-align: left;
  font-size: 12px; font-weight: 600; color: #64748b;
  border-bottom: 1px solid #e2e8f0;
}
.doc-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.doc-table tr:last-child td { border-bottom: none; }
.doc-filename { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.doc-summary { max-width: 220px; color: #475569; font-size: 12px; }
.doc-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.type-select {
  border: 1px solid #cbd5e1; border-radius: 5px; padding: 3px 6px;
  font-size: 11px; cursor: pointer; background: #fff; max-width: 120px;
}

/* 추출 상태 배지 */
.extract-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
}
.extract-pending    { background: #f1f5f9; color: #64748b; }
.extract-processing { background: #eff6ff; color: #1d4ed8; }
.extract-done       { background: #f0fdf4; color: #15803d; }
.extract-failed     { background: #fef2f2; color: #991b1b; }

/* 확신도 배지 */
.conf-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: #f0fdf4; color: #15803d; }
.conf-low   { background: #fff7ed; color: #92400e; font-weight: 600; }

/* ─ 사건 구조 추출 ─ */
.extraction-section {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px 20px;
}
.extraction-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.extraction-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
.no-extraction { color: #94a3b8; text-align: center; padding: 20px 0; font-size: 13px; }
.extraction-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.ex-card {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px;
}
.ex-card.ex-missing {
  background: #fff7ed; border-color: #fed7aa;
}
.ex-label { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
.evidence-list { display: flex; flex-wrap: wrap; gap: 6px; }
.ev-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
}
.ev-have    { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.ev-missing { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; font-weight: 600; }
.tag { display: inline-block; padding: 2px 8px; background: #f1f5f9; color: #475569; border-radius: 10px; font-size: 11px; margin-right: 4px; }

/* ─ 배지 ─ */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.status-badge { background: #f1f5f9; color: #475569; }
.outcome-approved { background: #f0fdf4; color: #15803d; }
.outcome-rejected { background: #fef2f2; color: #991b1b; }

/* ─ 버튼 ─ */
.btn {
  background: #2563eb; color: #fff; border: none;
  padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.btn:hover { background: #1d4ed8; }
.btn-sm {
  padding: 4px 10px; font-size: 12px; border-radius: 5px; cursor: pointer;
  border: 1px solid #2563eb; background: #fff; color: #2563eb; font-family: inherit;
}
.btn-sm:hover { background: #eff6ff; }
.btn-secondary { border-color: #cbd5e1; color: #475569; }
.btn-secondary:hover { background: #f1f5f9; }
.btn-warn { border-color: #f97316; color: #f97316; }
.btn-warn:hover { background: #fff7ed; }

/* ─ 모달 공통 ─ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 9000;
  align-items: center; justify-content: center;
}
.modal-overlay.show, .modal-overlay[style*="flex"] { display: flex; }
.modal-box {
  background: #fff; border-radius: 10px; padding: 24px;
  width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal-title {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
}
.modal-title strong { font-size: 15px; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; border: 1px solid #cbd5e1; border-radius: 6px;
  padding: 8px 10px; font-size: 13px; font-family: inherit;
}
.form-row textarea { min-height: 120px; resize: vertical; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-modal-cancel {
  padding: 8px 16px; border: 1px solid #cbd5e1; border-radius: 6px;
  background: #fff; font-size: 13px; cursor: pointer; font-family: inherit;
}

/* ─ 자료 뷰어 모달 ─ */
#viewerModal .modal-box { max-width: 860px; width: 95%; }
#viewerContent { margin-top: 12px; text-align: center; }

/* ─ 토스트 ─ */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none;
  max-width: 80vw;
}
.toast.show { opacity: 1; }
.toast.error { background: #dc2626; }

/* ─ 반응형 ─ */
@media (max-width: 680px) {
  .case-sidebar { width: 200px; min-width: 160px; }
}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <h1>🕊️ 순직 인정 지원 시스템</h1>
  <div class="topbar-right">
    <a href="/admin.html">← 관리자 홈</a>
  </div>
</div>

<!-- 마스터-디테일 레이아웃 -->
<div class="main-layout">

  <!-- 사건 목록 사이드바 -->
  <div class="case-sidebar">
    <div class="sidebar-header">
      <h2>사건 목록</h2>
      <div class="kind-toggle">
        <button class="kind-btn active" data-kind="active"
          onclick="setKindToggle('active'); loadCases()">지원 대상</button>
        <button class="kind-btn" data-kind="reference"
          onclick="setKindToggle('reference'); loadCases()">과거 사례</button>
      </div>
    </div>
    <div class="case-list" id="caseList">
      <div class="list-loading">불러오는 중…</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn" style="width:100%" onclick="openNewCaseModal()">+ 새 사건</button>
    </div>
  </div>

  <!-- 상세 패널 -->
  <div class="detail-pane">
    <div id="detailPane">
      <div class="empty-detail">
        <div class="empty-icon">🕊️</div>
        <div style="font-size:15px;font-weight:600;color:#475569">사건을 선택해주세요</div>
        <div style="font-size:13px;color:#94a3b8">왼쪽 목록에서 사건을 클릭하면 상세 내용이 표시됩니다</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ 새 사건 모달 ══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="newCaseModal">
  <div class="modal-box">
    <div class="modal-title">
      <strong>새 사건 등록</strong>
      <button class="modal-close" onclick="closeNewCaseModal()">&times;</button>
    </div>
    <form id="newCaseForm" onsubmit="return false">
      <div class="form-row">
        <label>사건 종류 <span style="color:#dc2626">*</span></label>
        <select id="nc_caseKind">
          <option value="active">지원 대상 (진행 중 사건)</option>
          <option value="reference">과거 사례 (학습용)</option>
        </select>
      </div>
      <div class="form-row">
        <label>사건 제목 <span style="color:#dc2626">*</span></label>
        <input id="nc_title" type="text" placeholder="예: ○○초 △△ 선생님 사건">
      </div>
      <div class="form-row">
        <label>고인 성명</label>
        <input id="nc_deceasedName" type="text" placeholder="홍길동">
      </div>
      <div class="form-row">
        <label>소속 학교</label>
        <input id="nc_schoolName" type="text" placeholder="○○초등학교">
      </div>
      <div class="form-row">
        <label>사망일</label>
        <input id="nc_deceasedAt" type="date">
      </div>
    </form>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeNewCaseModal()">취소</button>
      <button class="btn" onclick="submitNewCase()">등록</button>
    </div>
  </div>
</div>

<!-- ══ 기한 편집 모달 ══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="deadlineModal">
  <div class="modal-box">
    <div class="modal-title">
      <strong>절차·기한 편집</strong>
      <button class="modal-close" onclick="closeDeadlineModal()">&times;</button>
    </div>
    <div class="form-row">
      <label>행정 절차 단계</label>
      <select id="dl_stage">
        <option value="">-</option>
        <option value="apply">신청</option>
        <option value="review">심의</option>
        <option value="decided">결정</option>
        <option value="reappeal">재심</option>
      </select>
    </div>
    <div class="form-row">
      <label>다음 기한일</label>
      <input id="dl_date" type="date">
    </div>
    <div class="form-row">
      <label>기한 설명</label>
      <input id="dl_label" type="text" placeholder="예: 순직유족급여 청구 기한">
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeDeadlineModal()">취소</button>
      <button class="btn" onclick="submitDeadline()">저장</button>
    </div>
  </div>
</div>

<!-- ══ 수동 텍스트 입력 모달 ══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="manualTextModal">
  <div class="modal-box">
    <div class="modal-title">
      <strong>텍스트 직접 입력 (추출 실패 파일)</strong>
      <button class="modal-close" onclick="closeManualTextModal()">&times;</button>
    </div>
    <p style="font-size:12px;color:#64748b;margin:0 0 12px">
      파일에서 자동으로 글자를 읽지 못한 경우, 내용 요약이나 주요 텍스트를 붙여넣으면 AI 분류·분석에 활용됩니다.
    </p>
    <div class="form-row">
      <label>내용 (자유 형식)</label>
      <textarea id="manualText" placeholder="문서 내용, 요약, 또는 주요 정보를 입력하세요…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeManualTextModal()">취소</button>
      <button class="btn" onclick="submitManualText()">저장 및 AI 분류 요청</button>
    </div>
  </div>
</div>

<!-- ══ 자료 원문 뷰어 모달 ══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="viewerModal">
  <div class="modal-box" style="max-width:860px;width:95%">
    <div class="modal-title">
      <strong id="viewerTitle">자료 원문 보기</strong>
      <button class="modal-close" onclick="closeViewer()">&times;</button>
    </div>
    <div id="viewerContent"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="/js/admin-martyrdom.js?v=1"></script>
</body>
</html>
