# ============================================================
# Netlify 설정 — 교사유가족협의회 사이트 (SIREN)
# 원본 기존 설정 100% 보존 + K-9/L-5 추가분 통합
# ============================================================

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"

# ============================================================
# Redirects
# ============================================================

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/mypage"
  to = "/mypage.html"
  status = 200

# ★ K-9: 커스텀 404 라우팅 (다른 redirects보다 아래에 위치해야 함)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# Headers — 보안
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ★ API 응답 캐시 방지
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ============================================================
# Functions 설정
# ============================================================

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["db/**/*", "lib/**/*", "assets/fonts/**"]
  external_node_modules = ["postgres"]

# ★ STEP I-2: 채팅 이미지 자동 정리 (매일 새벽 3시 KST = UTC 18:00)
[functions."cleanup-chat-images"]
  schedule = "0 18 * * *"

# ★ Phase L-5: 정기 결제 cron (매일 새벽 3시 KST = UTC 18:00)
[functions."cron-billing-monthly"]
  schedule = "0 18 * * *"

# ============================================================
# Dev 설정
# ============================================================

[dev]
  port = 8888
  publish = "public"