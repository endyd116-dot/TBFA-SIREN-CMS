  included_files = ["assets/fonts/**"]
# ★ 2026-07-11 급여명세 전자서명·증빙보관 — PDF를 만드는 신규 함수 3개도 폰트 필요.
#   (payroll-my-ack=서명본 생성 / payroll-my-annual=연간내역서 / admin-payroll-evidence=증빙 문서·ZIP)
