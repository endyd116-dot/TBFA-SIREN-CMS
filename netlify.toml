# ★ P3: 순직 유족급여신청서 PDF 내보내기·사건 패키지 zip(보고서 PDF 포함)도 폰트 필요
[functions."admin-martyrdom-export"]
  included_files = ["assets/fonts/**"]
[functions."admin-martyrdom-package"]
  included_files = ["assets/fonts/**"]
# ★ 2026-07-02 폰트 누락 5건 수정: 폰트 읽는 lib(pdf-resolution·payroll-pdf·martyrdom-export)를
#   쓰는데 include가 빠져 라이브에서 PDF 생성이 조용히 실패하던 함수들(전수 grep으로 확인).
