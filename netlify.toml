# ★ Phase 8: 알림 발송 실패 재시도 cron (1시간 주기·:00 정렬)
# ★ 2026-06-25 DB 비용 절감 2차(wake-on-demand): 30분 → 1시간. Netlify 관리형 Neon은
#   autosuspend 최저가 5분이라 더 못 낮춤 → 대신 깨우는 횟수를 줄여 5분 잠을 더 길게.
#   :30 깨우기를 없애려 모든 빈발 크론을 :00로 정렬(시간당 1회 wake). 실패 재시도 1시간 지연 무해.
[functions."cron-notification-retry"]
  schedule = "0 * * * *"

# ★ Phase 10 R3: 발송 큐 디스패처 — 안전망 크론 (1시간 주기·:00 정렬)
# ★ 2026-06-25 DB 비용 절감(wake-on-demand): */10 상시 폴링 → 이벤트 기반 전환.
#   즉시 발송은 admin-send-job-create가 발송 큐 적재 직후 백그라운드 드레이너를 즉시 fire(지연 0).
#   이 크론은 안전망 — 예약 도래분·즉시-fire 누락분이 있을 때만 백그라운드를 깨우고 종료(DB 다시 잠).
#   2차: 30분 → 1시간(:00 정렬). 예약 발송만 최대 1시간 지연(즉시 발송은 이벤트로 무관).
[functions."cron-communication-send-dispatcher"]
  schedule = "0 * * * *"

# ★ 라운드 11: 워크스페이스 태스크 리마인더 (1시간 주기·:00 정렬) — reminder_config.remindAt 기반
# ★ 2026-06-25 DB 비용 절감 2차: 30분 → 1시간(:00 정렬·:30 wake 제거). 리마인더 최대 1시간 지연 허용.
[functions."cron-workspace-task-reminder"]
  schedule = "0 * * * *"

# ★ P2 순직 인정 지원: 기한 임박·소멸시효 + 저장용량 임계 알림 (매일 KST 08:00 = UTC 23:00)
[functions."cron-martyrdom-deadline"]
  schedule = "0 23 * * *"

# ★ R43 딥릴리프 외부 자료 격주 자동 수집 (매주 화요일 18:00 UTC = 매주 수요일 03:00 KST)
#   표준 cron은 격주 직접 지원 X — 함수 내부에서 last_cron_at 기준 "13일 이상 경과" 게이트로 격주.
#   ai_feature_settings.martyrdom_ai_external.enabled=false면 즉시 종료(fail-closed·비용 0).
