# ============================================================
# Netlify 설정 — 교사유가족협의회 사이트 (SIREN)
# 원본 기존 설정 100% 보존 + K-9/L-5 추가분 통합
# ============================================================

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"
  # ★ 2026-05-16: 빌드 시간 단축 — 오프라인 캐시 우선 + audit/fund 스킵
  NPM_FLAGS = "--prefer-offline --no-audit --no-fund"
  # ★ 2026-05-24: 배포 시간 단축 — 시크릿 스캔 비활성 (Swain 승인)
  #   비밀값(DB·JWT·결제·API 키)은 전부 Netlify 환경변수로만 주입되고 코드/출력에 미포함이라 안전.
  #   전체 출력 스캔 단계(수 분) 제거 → 매 배포 단축.
  SECRETS_SCAN_ENABLED = "false"
  # ★ 2026-05-17: proxy-server/ 폴더는 Oracle VM 배포용 README/스크립트라
  # Netlify 빌드 출력과 무관. 혹시 남는 placeholder가 잡히지 않도록 secret
  # scan에서 제외.
  SECRETS_SCAN_OMIT_PATHS = "proxy-server/**,docs/handover/**"

# ============================================================
# Redirects
# ============================================================

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/mypage"
  to = "/mypage.html"
  status = 200

# ============================================================
# ★ R42 SEO (2026-05-28): 동적 sitemap + 콘텐츠별 OG 메타 주입
# ★ R42-fix (2026-05-28): Function v2의 config.path에서 확장자(.xml·.html) 경로가
#   라이브에서 라우팅 미동작 — 함수 path를 /api/* 표준으로 옮기고 여기서 rewrite로 매핑.
# ============================================================
# 동적 사이트맵 — DB 발행 콘텐츠 자동 포함
[[redirects]]
  from = "/sitemap.xml"
  to = "/api/sitemap"
  status = 200
  force = true

# 동적 콘텐츠 페이지 — Function이 정적 HTML 읽어 콘텐츠 OG 메타 주입 후 반환
# 각 .html → /api/page-with-seo?_p=/xxx.html 로 rewrite. 함수는 _p 쿼리로 원래 경로 식별.
# (원래 페이지의 query string은 Netlify가 자동 전달 — slug=·id= 포함)
[[redirects]]
  from = "/campaign.html"
  to = "/api/page-with-seo?_p=/campaign.html"
  status = 200
  force = true

[[redirects]]
  from = "/incident.html"
  to = "/api/page-with-seo?_p=/incident.html"
  status = 200
  force = true

[[redirects]]
  from = "/activity.html"
  to = "/api/page-with-seo?_p=/activity.html"
  status = 200
  force = true

[[redirects]]
  from = "/board-view.html"
  to = "/api/page-with-seo?_p=/board-view.html"
  status = 200
  force = true

[[redirects]]
  from = "/family-story.html"
  to = "/api/page-with-seo?_p=/family-story.html"
  status = 200
  force = true

[[redirects]]
  from = "/memorial-teacher.html"
  to = "/api/page-with-seo?_p=/memorial-teacher.html"
  status = 200
  force = true

# ★ K-9: 커스텀 404 라우팅 (다른 redirects보다 아래에 위치해야 함)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# Headers — 보안
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ★ PWA 서비스워커 — 항상 최신 확인(업데이트 즉시 반영)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

# ★ API 응답 캐시 방지
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"

# ============================================================
# ★ R42 SEO (2026-05-28): 어드민·내부 페이지 검색엔진 차단
# robots.txt의 Disallow와 이중 안전망 — X-Robots-Tag는 응답 헤더라 더 강제력 있음
# ============================================================
[[headers]]
  for = "/admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cms-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/workspace*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/workspace-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/mypage*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/my-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/settings-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/billing-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/payment-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/email-*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/password-reset*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/manual-admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/form.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ============================================================
# Functions 설정
# ============================================================

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  # ★ 2026-07-02 배포시간 단축: 전역 included_files(db/**+lib/** ≈2MB) 제거.
  #   lib/db는 esbuild가 import를 코드로 번들하므로 파일 동봉 불필요(런타임 readFile 대상 전수 grep — lib/db 읽는 곳 0건).
  #   기존엔 598개 함수 zip마다 ~2MB 원본이 복사돼(합산 ≈1.2GB) 패키징·업로드를 키우던 주범.
  #   런타임 파일읽기는 assets/fonts(아래 함수별)·docs/law·public html(함수별 지정)뿐.
  # ★ 2026-05-16: 무거운 의존성 외부화로 함수 번들 시간·크기 단축.
  #   런타임에 node_modules에서 직접 로드되므로 콜드 스타트는 거의 영향 없고
  #   빌드 시간은 함수 수(170+) × 의존성 트리만큼 단축됨 (특히 aws-sdk 약 5MB).
  # ★ 2026-05-27: 배포 8분+ → 외부화 확대(Swain 요청). drizzle-orm은 거의 모든 함수가
  #   import → 170× 번들이 최대 병목이라 외부화. 대형 파서(exceljs·mammoth·pdf-parse·docx)
  #   + DB 클라이언트·인증·검증 lib까지 외부화 = esbuild 번들 작업 대폭 감소.
  #   (@netlify/functions는 런타임 제공이라 번들 유지)
  external_node_modules = [
    "postgres",
    "@neondatabase/serverless",
    "@netlify/neon",
    "@netlify/blobs",
    "drizzle-orm",
    "@aws-sdk/client-s3",
    "@aws-sdk/s3-request-presigner",
    "pdf-lib",
    "@pdf-lib/fontkit",
    "docx",
    "exceljs",
    "mammoth",
    "pdf-parse",
    "cfb",
    "fflate",
    "word-extractor",
    "bcryptjs",
    "jsonwebtoken",
    "zod",
    "resend",
    "sharp",
  ]

# ★ 2026-05-26: RAG 재색인 background 함수만 메뉴얼·Q&A 데이터 파일 포함
#   (전역 included_files에 넣으면 170+ 함수 전부 무거워짐 → 이 함수에만 한정)
#   Q&A jsonl 6개 + 메뉴얼 HTML 2개 + AI 지식문서 1개를 번들에 포함해야
#   운영(tbfa.co.kr) Functions 런타임에서 파일 읽기가 실제 내용을 반환함.
[functions."admin-rag-reindex-background"]
  included_files = ["docs/manual/**", "public/manual.html", "public/manual-admin.html", "docs/law/martyrdom/**"]

# ★ R42 SEO (2026-05-28): 동적 콘텐츠 페이지 메타 주입 함수
#   campaign/incident/activity/board-view/family-story/memorial-teacher 정적 HTML을
#   런타임에 읽어서 head에 콘텐츠별 OG 메타 주입 후 반환하므로 정적 HTML을 번들 포함.
[functions."page-with-seo"]
  included_files = ["public/campaign.html", "public/incident.html", "public/activity.html", "public/board-view.html", "public/family-story.html", "public/memorial-teacher.html"]

# ★ P2: 순직 인정요건 법령 AI 파싱(criteria-generate)도 법령 문서 번들 포함 필요
[functions."admin-martyrdom-criteria-generate"]
  included_files = ["docs/law/martyrdom/**"]

# ★ 폰트 필요한 5개 함수만 NotoSansKR 포함 (PDF 한글 렌더링용)
