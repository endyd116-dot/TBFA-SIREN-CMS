[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"

# ⚠️ [[redirects]] /api/* → 제거! v2 functions가 config.path로 직접 처리

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/mypage"
  to = "/mypage.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["db/**/*", "lib/**/*", "assets/fonts/**"]
  external_node_modules = ["postgres"]

# ★ STEP I-2: 채팅 이미지 자동 정리 스케줄 (매일 새벽 3시 KST = UTC 18:00)
[functions."cleanup-chat-images"]
  schedule = "0 18 * * *"
  
[dev]
  port = 8888
  publish = "public"

  # ============================================================
# ★ K-9: 커스텀 에러 페이지 라우팅
# ============================================================


[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404


# 500은 Netlify Functions가 throw할 때 자동 발생
# 정적 페이지로 리다이렉트시키려면 아래 주석 해제 (선택)
# [[redirects]]
#   from = "/*"
#   to = "/500.html"
#   status = 500

# ============================================================
# Netlify 설정 — 교사유가족협의회 사이트
# ============================================================

[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ===== 기본 보안 헤더 =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ===== API 캐시 방지 =====
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ===== K-9 커스텀 404 라우팅 =====
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# ★ Phase L-5: 정기 결제 cron 스케줄
# ============================================================
# 매일 새벽 03:00 KST (UTC 18:00) 실행
# 활성 빌링키 중 nextChargeAt <= 오늘인 건 결제 처리

[functions."cron-billing-monthly"]
  schedule = "0 18 * * *"