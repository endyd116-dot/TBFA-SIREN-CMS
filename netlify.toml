[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/mypage"
  to = "/mypage.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["db/**/*", "lib/**/*", "drizzle/**/*"]

[functions."*"]
  external_node_modules = ["@netlify/neon", "@netlify/blobs"]

[dev]
  port = 8888
  publish = "public"