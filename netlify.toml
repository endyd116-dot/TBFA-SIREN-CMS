# ============================================================
# Netlify 설정 — 교사유가족협의회 사이트 (SIREN)
# 원본 기존 설정 100% 보존 + K-9/L-5 추가분 통합
# ============================================================

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"

# ============================================================
# Redirects
# ============================================================

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/mypage"
  to = "/mypage.html"
  status = 200

# ★ K-9: 커스텀 404 라우팅 (다른 redirects보다 아래에 위치해야 함)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# Headers — 보안
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ★ API 응답 캐시 방지
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ============================================================
# Functions 설정
# ============================================================

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["db/**/*", "lib/**/*", "assets/fonts/**"]
  external_node_modules = ["postgres"]

# ★ STEP I-2: 채팅 이미지 자동 정리 (매일 새벽 3시 KST = UTC 18:00)
[functions."cleanup-chat-images"]
  schedule = "0 18 * * *"

# ★ Phase L-5: 정기 결제 cron (매일 새벽 3시 KST = UTC 18:00)
[functions."cron-billing-monthly"]
  schedule = "0 18 * * *"

# netlify.toml — cron-grade-recalc 블록 다음에 추가
# ★ Phase M-19-1: 회원 등급 일괄 재계산 (매일 새벽 3:30 KST = UTC 18:30)
[functions."cron-grade-recalc"]
  schedule = "30 18 * * *"

# netlify.toml — cron-cleanup-audit-logs 블록 다음에 추가
# ★ Phase M-16: 감사 로그 자동 정리 (매일 새벽 4:00 KST = UTC 19:00)
# - 일반 로그: 1년 이상 자동 삭제
# - 보안 로그(login_failed/withdraw_*/등): 2년까지 보관
[functions."cron-cleanup-audit-logs"]
  schedule = "0 19 * * *"

# ★ Phase M-19-1: 후원자 이탈 위험 평가 (매일 새벽 4:30 KST = UTC 19:30)
# - 활성 정기 후원자 + 최근 6개월 내 후원한 회원 평가
# - 룰 기반 점수 + AI 종합 분석 (members.churn_risk_* 갱신)
# - 환경변수 CHURN_AI_DISABLED=true 설정 시 룰 기반만 실행 (비용 차단)
[functions."cron-churn-predictor"]
  schedule = "30 19 * * *"

# ============================================================
# Dev 설정
# ============================================================


[dev]
  port = 8888
  publish = "public"